<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - JGeneration Ministry</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #dd2476;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --text-main: #f8fafc;
            --text-light: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .error-container {
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .error-code {
            font-family: 'Poppins', sans-serif;
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            margin: 0;
            background: linear-gradient(135deg, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(129, 140, 248, 0.3);
        }

        .error-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            margin: 20px 0 10px;
            color: #f1f5f9;
        }

        .error-desc {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <!-- GLOBAL HEADER -->
    <div id="globalHeader"></div>

    <div class="main-content">
        <div class="error-container">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-desc">Oops! It seems you've struck a wrong chord. The page you are looking for has been moved or doesn't exist.</p>
            
            <div class="action-buttons">
                <a href="/" class="btn btn-primary">
                    <i class="fa-solid fa-house"></i> Go Home
                </a>
                <a href="/keyboard-notes/index.html" class="btn btn-secondary">
                    <i class="fa-solid fa-music"></i> View Song Notes
                </a>
            </div>
        </div>
    </div>

    <!-- GLOBAL FOOTER -->
    <div id="globalFooter"></div>

    <script>
        // Load Global Header
        fetch("/header.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("globalHeader").innerHTML = data;
            }).catch(err => console.log("Header error:", err));

        // Load Global Footer
        fetch("/footer.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("globalFooter").innerHTML = data;
            }).catch(err => console.log("Footer error:", err));
    </script>
</body>
</html>
