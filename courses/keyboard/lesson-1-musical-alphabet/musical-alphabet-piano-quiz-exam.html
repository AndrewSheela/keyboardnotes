<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical Alphabet Piano Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- Mobile-First CSS Variables --- */
        :root {
            /* 90vw / 8 keys = 11.25vw. */
            --key-width: 11.25vw; 
            --white-key-height: calc(var(--key-width) * 5);
            --black-key-height: calc(var(--key-width) * 3);
            --black-key-width: calc(var(--key-width) * 0.6);
        }

        /* --- Desktop/Tablet Override (for screens >= 768px) --- */
        @media (min-width: 768px) {
            :root {
                --key-width: 70px; 
                --white-key-height: 350px;
                --black-key-height: 210px;
                --black-key-width: 42px;
            }
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fc;
            /* Center the content vertically and horizontally */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .piano-wrapper {
            width: 100%;
            overflow-x: hidden; 
        }
        
        .piano-container {
            display: flex;
            position: relative;
            margin: 0 auto;
            /* Set width based on keys */
            width: calc(8 * var(--key-width)); 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            background-color: #333;
            padding: 10px 0;
        }

        .white-key, .black-key {
            transition: background-color 0.05s ease, transform 0.05s ease, box-shadow 0.1s;
            cursor: pointer;
        }

        .white-key {
            width: var(--key-width);
            height: var(--white-key-height);
            background-color: #ffffff;
            border: 1px solid #00000020;
            box-shadow: inset 0 -8px 0 rgba(0, 0, 0, 0.1), 0 0 5px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 1;
            border-radius: 4px;
        }

        .white-key:active {
            background-color: #ddd;
            transform: translateY(2px);
            box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.1);
        }

        .black-key {
            width: var(--black-key-width);
            height: var(--black-key-height);
            background-color: #1a1a1a;
            position: absolute;
            z-index: 2;
            box-shadow: inset 0 -8px 0 #00000080, 0 0 10px rgba(0, 0, 0, 0.5);
            border-radius: 0 0 4px 4px;
        }

        .black-key:active {
            background-color: #000;
            transform: translateY(2px);
            box-shadow: inset 0 -4px 0 #00000080;
        }

        .correct-key {
            background-color: #34D399 !important; /* Green */
        }
        .incorrect-key {
            background-color: #F87171 !important; /* Red */
        }

        /* Modal specific styling */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
        .modal-content {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
            transform: scale(1);
            transition: transform 0.3s ease-out;
            max-width: 90%;
            width: 400px;
        }
    </style>
</head>
<body>

    <!-- Overall Application Title -->
    <div class="w-full max-w-4xl text-center mb-4">
        <h1 class="text-4xl font-extrabold text-indigo-700 mb-2">Musical Alphabet Piano Quiz</h1>
    </div>

    <!-- ---------------------------------------------------- -->
    <!--                  MAIN QUIZ VIEW                      -->
    <!-- ---------------------------------------------------- -->
    <div id="quiz-view" class="w-full max-w-4xl flex flex-col items-center">
        <p class="text-gray-600 mb-4 text-lg font-medium">Click the white key on the piano that corresponds to the natural note shown.</p>

        <!-- Quiz Display (Question and Score) -->
        <div id="quiz-area" class="bg-white p-6 rounded-xl shadow-lg w-full max-w-sm flex flex-col items-center space-y-4 border-4 border-indigo-200">
            <div class="text-xl font-semibold text-gray-700">
                Current Score: <span id="score-display" class="text-indigo-600 font-extrabold">0</span> / <span id="total-questions">20</span>
            </div>
            <!-- Reduced question size: text-7xl, h-16 -->
            <div id="question-display" class="text-7xl font-black text-gray-900 tracking-wider h-16 flex items-center justify-center">
                Ready?
            </div>
            <div id="feedback-message" class="h-6 text-lg font-semibold text-center transition-opacity duration-300">
                Click 'Start Game' to begin.
            </div>
        </div>

        <!-- Piano Keyboard Wrapper -->
        <div class="mt-10 mb-8 w-full flex justify-center piano-wrapper">
            <div id="piano-keys" class="piano-container">
                <!-- Keys will be injected here by JS -->
            </div>
        </div>

        <!-- Start Game Button - Visible before game starts and hidden during the game -->
        <div class="w-full max-w-sm">
             <button id="start-game-btn" class="w-full py-3 px-6 bg-indigo-600 text-white font-bold rounded-lg shadow-xl hover:bg-indigo-700 transition duration-150 transform hover:scale-[1.01]">
                 Start Game
             </button>
        </div>
    </div>

    <!-- ---------------------------------------------------- -->
    <!--                      PLAY AGAIN MODAL                    -->
    <!-- ---------------------------------------------------- -->
    <div id="play-again-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="text-3xl font-extrabold text-indigo-700 mb-4">Quiz Complete!</h2>
            <p id="modal-final-score" class="text-2xl text-gray-800 font-semibold mb-6">
                Your Final Score: <span class="text-green-600 font-black">0</span> / 20
            </p>
            <button id="play-again-btn" class="w-full py-3 px-6 bg-green-500 text-white font-bold rounded-lg shadow-xl hover:bg-green-600 transition duration-150 transform hover:scale-[1.01]">
                Play Again
            </button>
        </div>
    </div>

    <!-- --- JAVASCRIPT LOGIC --- -->
    <script>

        // --- QUIZ DATA & STATE ---
        const QUIZ_LIMIT = 20; 
        
        const noteMap = {
            'C': 'key-C', 'D': 'key-D', 'E': 'key-E', 
            'F': 'key-F', 'G': 'key-G', 'A': 'key-A', 'B': 'key-B',
            
            // Black keys and enharmonics are here but not used in question generation
            'Db': 'key-Cs', 'C#': 'key-Cs', 
            'Eb': 'key-Ds', 'D#': 'key-Ds', 
            'Gb': 'key-Fs', 'F#': 'key-Fs', 
            'Ab': 'key-Gs', 'G#': 'key-Gs', 
            'Bb': 'key-As', 'A#': 'key-As', 
            'B#': 'key-C', 'Fb': 'key-E', 'E#': 'key-F', 'Cb': 'key-B',
        };
        const naturalNotes = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
        const questions = naturalNotes; 
        
        let currentScore = 0;
        let totalQuestions = 0;
        let currentQuestion = '';
        let correctKeyId = ''; 
        let quizActive = false; // Initial state is false
        let nextQuestionTimer = null;

        // --- DOM Elements ---
        const $questionDisplay = document.getElementById('question-display');
        const $scoreDisplay = document.getElementById('score-display');
        const $totalQuestions = document.getElementById('total-questions');
        const $feedbackMessage = document.getElementById('feedback-message');
        const $pianoKeys = document.getElementById('piano-keys');
        const $startGameBtn = document.getElementById('start-game-btn'); // Renamed from reset-btn in logic
        
        // Modal Elements
        const $modal = document.getElementById('play-again-modal');
        const $playAgainBtn = document.getElementById('play-again-btn');
        const $modalFinalScore = document.getElementById('modal-final-score').querySelector('span');

        // --- PIANO RENDERING FUNCTIONS ---
        
        const getCssVariableValue = (variableName) => {
            const tempDiv = document.createElement('div');
            tempDiv.style.cssText = `width: var(${variableName}); visibility: hidden; position: absolute;`;
            document.body.appendChild(tempDiv);
            const value = tempDiv.offsetWidth;
            document.body.removeChild(tempDiv);
            return value;
        };

        const keyDefinitions = [
            { uniqueId: 'key-C4', baseNote: 'C', logicalId: 'key-C', blackKey: 'key-Cs' },
            { uniqueId: 'key-D4', baseNote: 'D', logicalId: 'key-D', blackKey: 'key-Ds' },
            { uniqueId: 'key-E4', baseNote: 'E', logicalId: 'key-E', blackKey: null },
            { uniqueId: 'key-F4', baseNote: 'F', logicalId: 'key-F', blackKey: 'key-Fs' },
            { uniqueId: 'key-G4', baseNote: 'G', logicalId: 'key-G', blackKey: 'key-Gs' },
            { uniqueId: 'key-A4', baseNote: 'A', logicalId: 'key-A', blackKey: 'key-As' },
            { uniqueId: 'key-B4', baseNote: 'B', logicalId: 'key-B', blackKey: null },
            { uniqueId: 'key-C5', baseNote: 'C', logicalId: 'key-C', blackKey: null }
        ];

        const blackKeyConfigMap = {
            'key-Cs': { baseNote: 'C#/Db' },
            'key-Ds': { baseNote: 'D#/Eb' },
            'key-Fs': { baseNote: 'F#/Gb' },
            'key-Gs': { baseNote: 'G#/Ab' },
            'key-As': { baseNote: 'A#/Bb' },
        };

        const renderPiano = () => {
            $pianoKeys.innerHTML = '';
            let whiteKeyIndex = 0; 

            const liveKeyWidth = getCssVariableValue('--key-width');
            const liveBlackKeyWidth = getCssVariableValue('--black-key-width');
            const liveBlackKeyHalfWidth = liveBlackKeyWidth / 2;

            keyDefinitions.forEach((key) => {
                const keyElement = document.createElement('div');
                keyElement.id = key.uniqueId;
                keyElement.className = 'white-key';
                keyElement.dataset.note = key.baseNote; 
                keyElement.dataset.logicalId = key.logicalId; 
                keyElement.addEventListener('click', handleKeyClick);
                $pianoKeys.appendChild(keyElement);
                whiteKeyIndex++;

                if (key.blackKey) {
                    const blackLogicalId = key.blackKey;
                    const blackKeyData = blackKeyConfigMap[blackLogicalId];

                    const blackKeyElement = document.createElement('div');
                    blackKeyElement.id = `${blackLogicalId}-${key.uniqueId.slice(3, 5)}`;
                    blackKeyElement.className = 'black-key';
                    blackKeyElement.dataset.note = blackKeyData.baseNote; 
                    blackKeyElement.dataset.logicalId = blackLogicalId; 
                    
                    blackKeyElement.addEventListener('click', handleKeyClick);
                    
                    const boundaryPosition = (whiteKeyIndex * liveKeyWidth);
                    const position = boundaryPosition - liveBlackKeyHalfWidth;
                    
                    blackKeyElement.style.left = `${position}px`;

                    $pianoKeys.appendChild(blackKeyElement);
                }
            });
        };

        // --- QUIZ LOGIC FUNCTIONS ---

        const generateNewQuestion = () => {
            if (totalQuestions >= QUIZ_LIMIT) return;

            if (nextQuestionTimer) {
                clearTimeout(nextQuestionTimer);
                nextQuestionTimer = null;
            }

            // Logic to prevent immediate repetition
            const previousQuestion = currentQuestion;
            let newQuestion = '';
            
            do {
                const randomIndex = Math.floor(Math.random() * questions.length);
                newQuestion = questions[randomIndex];
            } while (newQuestion === previousQuestion && questions.length > 1);

            currentQuestion = newQuestion;
            correctKeyId = noteMap[currentQuestion]; 

            $questionDisplay.textContent = currentQuestion;
            $feedbackMessage.textContent = `Question ${totalQuestions + 1} of ${QUIZ_LIMIT}. Click the correct key.`;
            $feedbackMessage.classList.remove('text-green-600', 'text-red-600', 'text-indigo-600', 'font-extrabold');
            $feedbackMessage.classList.add('text-gray-600');


            // Reset key colors
            document.querySelectorAll('.white-key, .black-key').forEach(key => {
                key.classList.remove('correct-key', 'incorrect-key');
            });
            
            quizActive = true; 
        };

        const updateScoreDisplay = () => {
            $scoreDisplay.textContent = currentScore;
        };

        const showModal = (score) => {
            $modalFinalScore.textContent = score;
            $modal.classList.remove('hidden');
        };

        const hideModal = () => {
            $modal.classList.add('hidden');
        };

        const handleKeyClick = (event) => {
            // Prevent interaction if quiz is paused or finished
            if (!quizActive || totalQuestions >= QUIZ_LIMIT) return; 

            quizActive = false; // Pause quiz

            const selectedKeyElement = event.currentTarget;
            const selectedLogicalId = selectedKeyElement.dataset.logicalId;
            const isCorrect = selectedLogicalId === correctKeyId; 

            totalQuestions++;
            
            const correctKeyElements = document.querySelectorAll(`[data-logical-id="${correctKeyId}"]`);
            
            if (isCorrect) {
                correctKeyElements.forEach(key => key.classList.add('correct-key'));
                currentScore++;
                $feedbackMessage.textContent = 'Correct! Great job.';
                $feedbackMessage.classList.remove('text-gray-600', 'text-red-600');
                $feedbackMessage.classList.add('text-green-600');
            } else {
                selectedKeyElement.classList.add('incorrect-key');
                correctKeyElements.forEach(key => key.classList.add('correct-key')); 
                
                $feedbackMessage.textContent = `Incorrect. The correct key for ${currentQuestion} is shown in green.`;
                $feedbackMessage.classList.remove('text-gray-600', 'text-green-600');
                $feedbackMessage.classList.add('text-red-600');
            }

            updateScoreDisplay();

            if (totalQuestions >= QUIZ_LIMIT) {
                // QUIZ FINISHED
                $questionDisplay.textContent = 'Finished!';
                $feedbackMessage.textContent = `Quiz Complete! Final Score: ${currentScore} out of ${QUIZ_LIMIT}.`;
                $feedbackMessage.classList.remove('text-green-600', 'text-red-600', 'text-gray-600');
                $feedbackMessage.classList.add('text-indigo-700', 'font-extrabold');
                
                // Show the Play Again modal
                if (nextQuestionTimer) { clearTimeout(nextQuestionTimer); }
                showModal(currentScore);
                
                // Ensure the quiz remains inactive
                quizActive = false; 

            } else {
                // Continue to the next question
                nextQuestionTimer = setTimeout(generateNewQuestion, 1200);
            }
        };

        // Function to start or restart the game
        const startGame = () => {
            if (nextQuestionTimer) {
                clearTimeout(nextQuestionTimer);
                nextQuestionTimer = null;
            }
            
            hideModal(); // Hide the modal if visible
            $startGameBtn.classList.add('hidden'); // Hide the start button while game is running
            
            currentScore = 0;
            totalQuestions = 0;
            $totalQuestions.textContent = QUIZ_LIMIT;
            updateScoreDisplay();
            
            $questionDisplay.textContent = 'C'; // Initial note before first question
            
            // Start the first question
            generateNewQuestion();
        };

        const initQuiz = () => {
            // Re-render piano on resize to keep responsive layout accurate
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(renderPiano, 100);
            });
            
            renderPiano();
            
            // Set up button listeners
            $startGameBtn.addEventListener('click', startGame);
            $playAgainBtn.addEventListener('click', startGame);
            
            // Initial UI state: Show start button, hide modal
            $startGameBtn.classList.remove('hidden');
            hideModal();
        };

        // Initialize the quiz when the script loads
        initQuiz();
    </script>
</body>
</html>
