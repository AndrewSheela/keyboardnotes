<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Notes Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .song-row {
            transition: all 0.2s ease;
        }
        .song-row:hover {
            background-color: #f1f5f9;
        }

        /* Filter Buttons: Black font by default, white when active */
        .filter-btn {
            color: #0f172a; /* Slate-900 (Deep Black) */
            background-color: transparent;
        }
        
        .filter-btn.active {
            background-color: #2563eb !important;
            color: white !important;
            border-color: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="globalHeader"></div>

    <header class="py-16 px-6 bg-slate-900 text-white text-center">
        <h1 class="text-4xl md:text-5xl font-bold mb-4 tracking-tight">Keyboard Notes Library</h1>
        <p class="text-slate-400 max-w-2xl mx-auto text-lg">Quick access to Western and Indian classical music notation.</p>
    </header>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 -mt-10">
        <div class="glass sticky top-6 z-20 p-5 rounded-2xl shadow-xl mb-8">
            <div class="flex flex-col gap-4">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex items-center space-x-2 text-slate-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
                        </svg>
                        <span class="text-sm font-bold uppercase tracking-wider">Select Language</span>
                    </div>
                    <input type="text" id="songSearch" placeholder="Search songs..." onkeyup="renderSongs()" class="px-4 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none w-full md:w-64">
                </div>
                
                <div class="flex flex-wrap gap-2" id="filter-container">
                    <button data-lang="all" onclick="setFilter('all')" class="filter-btn active px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold transition-all">All</button>
                    <button data-lang="Tamil" onclick="setFilter('Tamil')" class="filter-btn px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold transition-all">Tamil</button>
                    <button data-lang="Telugu" onclick="setFilter('Telugu')" class="filter-btn px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold transition-all">Telugu</button>
                    <button data-lang="Kannada" onclick="setFilter('Kannada')" class="filter-btn px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold transition-all">Kannada</button>
                    <button data-lang="Hindi" onclick="setFilter('Hindi')" class="filter-btn px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold transition-all">Hindi</button>
                    <button data-lang="Malayalam" onclick="setFilter('Malayalam')" class="filter-btn px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold transition-all">Malayalam</button>
                    <button data-lang="English" onclick="setFilter('English')" class="filter-btn px-5 py-2 rounded-xl border border-slate-200 text-sm font-bold transition-all">English</button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-20">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Song Name</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider hidden sm:table-cell">Album / Artist</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Language</th>
                            <th class="px-6 py-4 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="songs-list-body"></tbody>
                </table>
            </div>
        </div>

        <div id="empty-state" class="hidden text-center py-20 bg-white rounded-2xl border border-dashed border-slate-300">
            <h3 class="mt-4 text-lg font-semibold text-slate-900">No matching songs found</h3>
        </div>
    </main>

    <div id="footer"></div>

    <script>
        // Set this to "notes" to highlight the Keyboard Notes button in your header
        var ACTIVE_NAV = "notes"; 

        fetch("/header.html")
          .then(res => res.text())
          .then(data => {
            document.getElementById("globalHeader").innerHTML = data;

            // Mapping from ACTIVE_NAV keys to your CSS classes
            var map = {
              'home':    '.btn-home',
              'notes':   '.btn-notes',
              'videos':  '.btn-videos',
              'bible':   '.btn-bible',
              'courses': '.btn-courses',
              'ppt':     '.btn-ppt',
              'about':   '.btn-about'
            };
            
            var el = document.querySelector(map[ACTIVE_NAV]);
            if (el) el.classList.add('active');

            // Load Global Search
            var script = document.createElement("script");
            script.src = "/js/global-search.js?v=" + Date.now();
            document.body.appendChild(script);
          })
          .catch(err => console.error("Header load failed:", err));

        // Load Footer
        fetch("/footer.html").then(res => res.text()).then(data => document.getElementById("footer").innerHTML = data);

        // --- SONG LIBRARY LOGIC ---
        const songData = [
            { name: "Vaethanai En Valvil", info: "Paul Thangiah", lang: "Tamil", url: "/keyboard-notes/tamil-songs/Vaethanai-En-Valvil.html" },
            { name: "Yaega Sinthaiyae", info: "Aaron Samuel", lang: "Tamil", url: "/keyboard-notes/tamil-songs/Yega-Sinthaye-Yega-Snegame.html" },
            { name: "Vazhvin Aadharamae", info: "Alwin Thomas", lang: "Tamil", url: "/keyboard-notes/tamil-songs/Vazhvin-Aadharamae.html" },
            { name: "Nannalli Vasisuveya", info: "Jacob Bhushan", lang: "Telugu", url: "/keyboard-notes/telugu-songs/Nannalli-Vasisuveya.html" },
            { name: "Prabhu Na Papamulanu", info: "Gowtam Israel", lang: "Telugu", url: "/keyboard-notes/telugu-songs/Prabhu-Na-Papamulanu.html" }
       ];

        let currentFilter = 'all';

        function setFilter(lang) {
            currentFilter = lang;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });
            renderSongs();
        }

        function renderSongs() {
            const listBody = document.getElementById('songs-list-body');
            const searchVal = document.getElementById('songSearch').value.toLowerCase();
            const emptyState = document.getElementById('empty-state');
            const tableContainer = listBody.closest('.bg-white');

            const filtered = songData.filter(song => {
                const matchesLang = currentFilter === 'all' || song.lang === currentFilter;
                const matchesSearch = song.name.toLowerCase().includes(searchVal) || 
                                    song.info.toLowerCase().includes(searchVal);
                return matchesLang && matchesSearch;
            });

            if (filtered.length > 0) {
                listBody.innerHTML = filtered.map(song => `
                    <tr class="song-row border-b border-slate-100 group">
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-900">${song.name}</div>
                            <div class="sm:hidden text-xs text-slate-500">${song.info}</div>
                        </td>
                        <td class="px-6 py-4 text-sm text-slate-600 hidden sm:table-cell">${song.info}</td>
                        <td class="px-6 py-4">
                            <span class="bg-slate-100 text-slate-600 text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wide">${song.lang}</span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <a href="${song.url}" class="text-blue-600 hover:text-blue-800 font-bold text-sm inline-flex items-center">
                                Notes <svg class="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
                            </a>
                        </td>
                    </tr>
                `).join('');
                tableContainer.classList.remove('hidden');
                emptyState.classList.add('hidden');
            } else {
                tableContainer.classList.add('hidden');
                emptyState.classList.remove('hidden');
            }
        }

        window.onload = renderSongs;
    </script>
</body>
</html>
