<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0d0b;--surf:#18160f;--s2:#201d13;--s3:#2a2618;--brd:#36311f;--brd2:#4a4328;--gold:#c89a2c;--gh:#e6b84a;--gl:#7a5c16;--gg:rgba(200,154,44,.18);--tx:#f2ede2;--tm:#9a9080;--td:#4e4838;--sheet:#faf8f4;--r:10px}
html,body{background:var(--bg);color:var(--tx);font-family:'DM Sans',-apple-system,sans-serif;font-size:15px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}
header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.75rem;background:rgba(14,13,11,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd)}
.lm{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:var(--gh);letter-spacing:.08em}.lt{font-size:.75rem;color:var(--tm);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr{display:flex;gap:.5rem;align-items:center}
.toolbar{display:flex;align-items:center;flex-wrap:nowrap;gap:.4rem .75rem;padding:0 1.75rem;height:46px;background:var(--surf);border-bottom:1px solid var(--brd);overflow:hidden}
.tl{display:flex;align-items:center;flex-wrap:nowrap;gap:.55rem .9rem;flex:1;height:100%}.tr{display:flex;align-items:center;gap:.45rem}
.tg{display:flex;align-items:center;gap:.4rem;flex-shrink:0}.tlb{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--td);font-weight:500}.tdv{width:1px;height:24px;background:var(--brd)}
.cb{width:28px;height:28px;min-height:28px;border-radius:50%;background:var(--s2);border:1px solid var(--brd2);color:var(--tx);font-size:.95rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .13s;user-select:none;flex-shrink:0}
.cb:hover{background:var(--s3);border-color:var(--gl);color:var(--gh);box-shadow:0 0 0 3px var(--gg)}.cb:active{transform:scale(.9)}
.vd{min-width:38px;text-align:center;padding:0 .48rem;height:28px;max-height:28px;line-height:28px;background:var(--s3);border:1px solid var(--brd2);border-radius:8px;font-size:.82rem;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--gh);overflow:hidden;flex-shrink:0}
.vd.zero{color:var(--tm)}.vd.sm{font-size:.82rem;min-width:46px}
.t-reset{padding:0 .55rem;height:28px;line-height:28px;border-radius:8px;background:transparent;border:1px solid var(--brd);color:var(--td);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}
.t-reset:hover{border-color:var(--brd2);color:var(--tm)}
.bg{display:flex;border:1px solid var(--brd2);border-radius:var(--r);overflow:hidden}
.bg button{padding:0 .48rem;height:28px;line-height:28px;background:var(--s2);border:none;border-right:1px solid var(--brd2);color:var(--tm);font-size:.72rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .12s;min-width:26px}
.bg button:last-child{border-right:none}.bg button:hover{background:var(--s3);color:var(--tx)}.bg button.active{background:var(--gold);color:#1a1000;font-weight:600}
.tog{padding:.2rem .6rem;border-radius:var(--r);background:var(--s2);border:1px solid var(--brd2);color:var(--tm);font-size:.74rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .13s}
.tog.on{background:rgba(200,154,44,.1);border-color:var(--gl);color:var(--gh)}
.mw{display:flex;align-items:center;gap:.3rem;padding:0 .55rem;height:28px;background:var(--s2);border:1px solid var(--brd2);border-radius:var(--r);cursor:pointer;transition:all .13s;user-select:none;flex-shrink:0}
.mw:hover{border-color:var(--gl)}.mw.mon{background:var(--gg);border-color:var(--gl)}
.mdot{width:5px;height:5px;border-radius:50%;background:var(--tm);transition:transform .05s,background .05s;flex-shrink:0}.mw.mon .mdot{background:var(--gold)}.mdot.beat{transform:scale(2)}
.ba{background:none;border:none;color:var(--td);font-size:.68rem;cursor:pointer;padding:0 2px;font-family:'DM Sans',sans-serif}.ba:hover{color:var(--gh)}
.bv{font-size:.78rem;color:var(--tm);min-width:28px;text-align:center;pointer-events:none}.bl{font-size:.65rem;letter-spacing:.09em;color:var(--td);pointer-events:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.3rem;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;border:none;white-space:nowrap;transition:all .14s;border-radius:var(--r)}
.btn:active{transform:scale(.96)}
.b-gh{padding:.38rem .85rem;background:transparent;border:1px solid var(--brd2);color:var(--tm)}.b-gh:hover{border-color:var(--gl);color:var(--gh);background:var(--gg)}
.b-og{padding:.38rem 1rem;background:transparent;border:1px solid var(--gl);color:var(--gold)}.b-og:hover{background:var(--gg);border-color:var(--gold);color:var(--gh)}
.sw{padding:1.5rem}.si{max-width:1100px;margin:0 auto}
#so{background:var(--sheet);border-radius:16px;padding:2.25rem 2.75rem;min-height:200px;box-shadow:0 12px 50px rgba(0,0,0,.5);overflow:hidden}
#so svg{display:block;max-width:100%;height:auto}
.sm{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem;gap:.6rem;color:var(--tm);text-align:center}
.sm .si2{font-size:2rem;opacity:.18}.sm .st{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase}
#ld{display:none;position:fixed;inset:0;z-index:200;background:rgba(14,13,11,.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;flex-direction:column;gap:1rem}
#ld.show{display:flex}.sp{width:36px;height:36px;border:2px solid var(--brd2);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}.lm2{font-size:.76rem;letter-spacing:.14em;text-transform:uppercase;color:var(--tm)}
#tt{display:none;position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:300;padding:.58rem 1.2rem;border-radius:100px;background:var(--s3);border:1px solid var(--brd2);font-size:.8rem;color:var(--tx);box-shadow:0 6px 24px rgba(0,0,0,.5);animation:fi .2s ease;white-space:nowrap}
#tt.show{display:block}@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@media print{body{background:#fff}header,.toolbar,#ld,#tt{display:none!important}.sw{padding:0}.si{max-width:100%}#so{box-shadow:none;border-radius:0;padding:0;background:#fff}}

function getXML(){const x=ta?txXML(base,ta):base;if(showC)return x;const d=new DOMParser().parseFromString(x,'text/xml');d.querySelectorAll('harmony').forEach(h=>h.remove());return san(new XMLSerializer().serializeToString(d));}
const sL=m=>{document.getElementById('lm2').textContent=m||'Rendering…';document.getElementById('ld').classList.add('show');};
const hL=()=>document.getElementById('ld').classList.remove('show');
function sT(m){const t=document.getElementById('tt');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);}
const uTD=()=>{const e=document.getElementById('td');e.textContent=ta===0?'0':(ta>0?'+'+ta:''+ta);e.classList.toggle('zero',ta===0);};
const uZD=()=>document.getElementById('zd').textContent=Math.round(zoom*100)+'%';
const uMPL=()=>document.querySelectorAll('.mb').forEach(b=>b.classList.toggle('active',b.dataset.val===String(mpl)));
const uC=()=>document.getElementById('xtog').classList.toggle('on',showC);
const uB=()=>document.getElementById('bv2').textContent=bpm;
function apER(){if(!osmd||!osmd.EngravingRules)return;osmd.Zoom=zoom;if(mpl>0){const cw=Math.max(400,document.getElementById('so').clientWidth-80);osmd.EngravingRules.FixedMeasureWidth=true;osmd.EngravingRules.FixedMeasureWidthFixedValue=cw/(mpl*10*zoom);}else osmd.EngravingRules.FixedMeasureWidth=false;}
async function rndr(msg){if(isR)return;isR=true;sL(msg);try{const xml=getXML();new DOMParser().parseFromString(xml,'text/xml');osmd=null;document.getElementById('so').innerHTML='';osmd=new opensheetmusicdisplay.OpenSheetMusicDisplay('so',{autoResize:false,drawTitle:true,drawSubtitle:true,drawComposer:true,drawingParameters:'default'});apER();await osmd.load(xml);apER();osmd.render();}catch(e){console.error(e);document.getElementById('so').innerHTML='<div class="sm"><div class="si2">⚠</div><div class="st">Render failed</div></div>';sT('Render failed');}finally{isR=false;hL();}}
async function xPDF(){sL('Generating PDF…');try{const c=await html2canvas(document.getElementById('so'),{scale:2,backgroundColor:'#faf8f4',useCORS:true,logging:false});const{jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:'p',unit:'pt',format:'a4'});const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight(),iw=c.width,ih=c.height,rat=iw/pw;let y=0,pg=0;while(y<ih){if(pg>0)pdf.addPage();const sh=Math.min(ph*rat,ih-y);const t=document.createElement('canvas');t.width=iw;t.height=sh;const cx=t.getContext('2d');cx.fillStyle='#fff';cx.fillRect(0,0,iw,sh);cx.drawImage(c,0,y,iw,sh,0,0,iw,sh);pdf.addImage(t.toDataURL('image/png'),'PNG',0,0,pw,sh/rat);y+=ph*rat;pg++;}pdf.save('Halleluia Elshadai'+(ta?'_'+(ta>0?'+':'')+ta:'')+'.pdf');sT('PDF saved!');}catch(ex){sT('PDF failed');}finally{hL();}}
function tick(acc){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=acc?1200:880;g.gain.setValueAtTime(acc?.38:.22,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.07);o.start(ac.currentTime);o.stop(ac.currentTime+.07);const d=document.getElementById('md2');if(d){d.classList.add('beat');setTimeout(()=>d.classList.remove('beat'),60);}}
function togM(){mOn=!mOn;document.getElementById('mw2').classList.toggle('mon',mOn);if(mOn){bc=0;tick(true);mT=setInterval(()=>{bc++;tick(bc%4===0);},60000/bpm);}else{clearInterval(mT);mT=null;}}
function adjB(d){bpm=Math.max(20,Math.min(300,bpm+d));uB();if(mOn){clearInterval(mT);mT=setInterval(()=>{bc++;tick(bc%4===0);},60000/bpm);}}
document.getElementById('xm').onclick=()=>{ta--;uTD();rndr('Transposing…');};
document.getElementById('xp').onclick=()=>{ta++;uTD();rndr('Transposing…');};
document.getElementById('xr').onclick=()=>{if(!ta)return;ta=0;uTD();rndr('Resetting…');};
document.getElementById('zm').onclick=()=>{zoom=Math.max(.4,+(zoom-.1).toFixed(2));uZD();rndr();};
document.getElementById('zp').onclick=()=>{zoom=Math.min(2.5,+(zoom+.1).toFixed(2));uZD();rndr();};
document.querySelectorAll('.mb').forEach(b=>b.addEventListener('click',()=>{mpl=parseInt(b.dataset.val);uMPL();rndr();}));
document.getElementById('xtog').onclick=()=>{showC=!showC;uC();rndr();};
document.getElementById('mw2').addEventListener('click',()=>togM());
document.getElementById('xpdf').onclick=xPDF;
document.addEventListener('keydown',ev=>{if(ev.key==='ArrowUp'||ev.key==='+')document.getElementById('xp').click();if(ev.key==='ArrowDown'||ev.key==='-')document.getElementById('xm').click();if(ev.key==='r')document.getElementById('xr').click();if(ev.key===' '){ev.preventDefault();togM();}if(ev.ctrlKey&&ev.key==='p'){ev.preventDefault();window.print();}if(ev.ctrlKey&&ev.key==='s'){ev.preventDefault();xPDF();}});
