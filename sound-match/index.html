<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamHub — Music Academy</title>
  <style>
/* ═══════════════════════════════════════════
   ExamHub · Main CSS
   Dark gold theme — Andrew's Music Academy
═══════════════════════════════════════════ */

:root {
  --gold:        #D4A017;
  --gold-light:  #F0C040;
  --gold-dark:   #9A7010;
  --bg:          #0D0D0D;
  --bg2:         #141414;
  --bg3:         #1C1C1C;
  --bg4:         #242424;
  --border:      #2E2E2E;
  --text:        #E8E8E8;
  --text2:       #A0A0A0;
  --text3:       #606060;
  --success:     #2ECC71;
  --danger:      #E74C3C;
  --info:        #3498DB;
  --warn:        #F39C12;
  --radius:      10px;
  --sidebar-w:   220px;
  --font:        'Segoe UI', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── SCREENS ─── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; }

/* ─── LOGIN ─── */
#screen-login {
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at 50% 0%, #1a1200 0%, var(--bg) 70%);
}

.login-wrap {
  width: 100%;
  max-width: 420px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.login-logo {
  text-align: center;
}
.logo-icon { font-size: 52px; line-height: 1; margin-bottom: 8px; }
.login-logo h1 {
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.tagline { color: var(--text2); font-size: 0.85rem; margin-top: 4px; }

.login-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.tab-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  background: var(--bg3);
  padding: 4px;
  border-radius: 8px;
}
.tab-btn {
  padding: 9px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--text2);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all .2s;
  font-family: var(--font);
}
.tab-btn.active {
  background: var(--gold);
  color: #000;
  font-weight: 700;
}

.field-group { display: flex; flex-direction: column; gap: 6px; }
.field-group label { font-size: 0.8rem; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
.field-group input {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.95rem;
  padding: 10px 14px;
  outline: none;
  font-family: var(--font);
  transition: border .2s;
}
.field-group input:focus { border-color: var(--gold); }

.login-hint { font-size: 0.75rem; color: var(--text3); text-align: center; }
.login-hint b { color: var(--gold); }

/* ─── APP SHELL ─── */
.app-shell {
  display: flex;
  width: 100%;
  min-height: 100vh;
}

/* ─── SIDEBAR ─── */
.sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px 0;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar-brand {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--gold);
  padding: 0 18px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  padding: 0 10px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 12px;
  border-radius: 8px;
  color: var(--text2);
  text-decoration: none;
  font-size: 0.88rem;
  transition: all .15s;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(212,160,23,.12); color: var(--gold); font-weight: 600; }

.btn-logout {
  margin: 12px 10px 0;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text3);
  padding: 9px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.85rem;
  transition: all .2s;
}
.btn-logout:hover { border-color: var(--danger); color: var(--danger); }

/* ─── MAIN CONTENT ─── */
.main-content {
  flex: 1;
  padding: 28px 32px;
  overflow-y: auto;
  max-height: 100vh;
}

/* ─── EXAM SHELL ─── */
#screen-exam { flex-direction: column; }
.exam-shell {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
.exam-header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px 0;
  position: sticky;
  top: 0;
  z-index: 10;
}
.exam-title-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
#exam-taking-title { font-size: 1.05rem; font-weight: 700; color: var(--gold); }
.exam-meta-bar { display: flex; gap: 12px; }
.timer-badge, .progress-badge {
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.82rem;
  color: var(--text2);
}
.timer-badge.warn { color: var(--warn); border-color: var(--warn); }
.timer-badge.danger { color: var(--danger); border-color: var(--danger); }

.exam-prog-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
}
#exam-prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
  border-radius: 2px;
  transition: width .4s ease;
}

.exam-body {
  flex: 1;
  padding: 32px 24px;
  max-width: 780px;
  margin: 0 auto;
  width: 100%;
}

.exam-footer {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  bottom: 0;
}
.q-dots {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  flex: 1;
}
.q-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg3);
  cursor: pointer;
  font-size: 0.7rem;
  color: var(--text3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
}
.q-dot.current { border-color: var(--gold); color: var(--gold); }
.q-dot.answered { background: var(--gold-dark); border-color: var(--gold); color: #000; }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.hidden { display: none; }
.modal-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 100%;
  max-width: 700px;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  width: 30px; height: 30px;
  cursor: pointer;
  font-size: 0.8rem;
}
.modal-close:hover { color: var(--danger); border-color: var(--danger); }

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
  font-size: 0.88rem;
  z-index: 2000;
  max-width: 340px;
  animation: slideUp .3s ease;
}
.toast.hidden { display: none; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error   { border-color: var(--danger);  color: var(--danger);  }
.toast.info    { border-color: var(--info);     color: var(--info);    }

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

/* ─── RESPONSIVE ─── */
@media (max-width: 700px) {
  .sidebar { display: none; }
  .main-content { padding: 16px; }
  :root { --sidebar-w: 0px; }
}


/* ═══════════════════════════════════════════
   ExamHub · Components CSS
═══════════════════════════════════════════ */

/* ─── PAGE HEADER ─── */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}
.page-header h2 {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--text);
}
.page-header p { color: var(--text2); font-size: 0.88rem; margin-top: 2px; }

/* ─── STAT CARDS ─── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 14px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.stat-card .s-icon { font-size: 1.5rem; }
.stat-card .s-val  { font-size: 1.8rem; font-weight: 800; color: var(--gold); line-height: 1; }
.stat-card .s-label{ font-size: 0.78rem; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }

/* ─── SECTION ─── */
.section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 20px;
  overflow: hidden;
}
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-wrap: wrap;
}
.section-head h3 { font-size: 0.95rem; font-weight: 700; }
.section-body { padding: 18px; }

/* ─── BUTTONS ─── */
.btn-primary, .btn-secondary, .btn-danger, .btn-ghost, .btn-success {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 0.88rem;
  font-family: var(--font);
  font-weight: 600;
  transition: all .15s;
  text-decoration: none;
  white-space: nowrap;
}
.btn-primary   { background: var(--gold); color: #000; }
.btn-primary:hover { background: var(--gold-light); }
.btn-secondary { background: var(--bg3); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
.btn-danger    { background: rgba(231,76,60,.15); border: 1px solid var(--danger); color: var(--danger); }
.btn-danger:hover { background: rgba(231,76,60,.28); }
.btn-ghost     { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { color: var(--text); border-color: var(--text2); }
.btn-success   { background: rgba(46,204,113,.15); border: 1px solid var(--success); color: var(--success); }
.btn-success:hover { background: rgba(46,204,113,.28); }
.btn-sm { padding: 5px 11px; font-size: 0.8rem; }
.full { width: 100%; justify-content: center; }

/* ─── TABLES ─── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.87rem; }
thead th {
  text-align: left;
  padding: 10px 14px;
  background: var(--bg3);
  color: var(--text2);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: .5px;
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
tbody td { padding: 10px 14px; }

/* ─── BADGES ─── */
.badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 20px;
  font-size: 0.73rem;
  font-weight: 600;
  letter-spacing: .3px;
}
.badge-gold   { background: rgba(212,160,23,.2);  color: var(--gold);    }
.badge-green  { background: rgba(46,204,113,.15); color: var(--success); }
.badge-red    { background: rgba(231,76,60,.15);  color: var(--danger);  }
.badge-blue   { background: rgba(52,152,219,.15); color: var(--info);    }
.badge-grey   { background: var(--bg3);           color: var(--text2);   }

/* ─── FORMS ─── */
.form-grid {
  display: grid;
  gap: 16px;
}
.form-grid.cols2 { grid-template-columns: 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.span2 { grid-column: span 2; }
.form-group label {
  font-size: 0.78rem;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .4px;
}
.form-group input,
.form-group select,
.form-group textarea {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.92rem;
  padding: 9px 13px;
  outline: none;
  font-family: var(--font);
  transition: border .2s;
  width: 100%;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--gold); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-group select option { background: var(--bg3); }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }

/* ─── SEARCH BAR ─── */
.search-bar {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.search-bar input, .search-bar select {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 8px 13px;
  font-size: 0.87rem;
  font-family: var(--font);
  outline: none;
}
.search-bar input { flex: 1; min-width: 140px; }
.search-bar input:focus, .search-bar select:focus { border-color: var(--gold); }

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}
.empty-state .e-icon { font-size: 2.5rem; margin-bottom: 10px; }
.empty-state p { font-size: 0.9rem; }

/* ─── ERROR MSG ─── */
.error-msg {
  background: rgba(231,76,60,.12);
  border: 1px solid var(--danger);
  border-radius: 8px;
  color: var(--danger);
  padding: 9px 13px;
  font-size: 0.85rem;
}

/* ─── QUESTION CARD ─── */
.q-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px 24px;
  margin-bottom: 10px;
}
.q-card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}
.q-card-head .q-num {
  background: var(--gold-dark);
  color: #000;
  font-size: 0.75rem;
  font-weight: 800;
  padding: 3px 9px;
  border-radius: 12px;
  white-space: nowrap;
  flex-shrink: 0;
}
.q-card-head .q-text {
  font-size: 1rem;
  font-weight: 600;
  line-height: 1.5;
  flex: 1;
}
.q-card-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* ─── QUESTION TYPES — exam taking ─── */

/* MCQ */
.mcq-options { display: flex; flex-direction: column; gap: 10px; }
.mcq-option {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.mcq-option:hover { border-color: var(--gold-dark); }
.mcq-option.selected { border-color: var(--gold); background: rgba(212,160,23,.08); }
.mcq-option .opt-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.78rem; font-weight: 700;
  flex-shrink: 0;
}
.mcq-option.selected .opt-letter { background: var(--gold); border-color: var(--gold); color: #000; }

/* Fill in the blank */
.fill-blank-wrap { display: flex; flex-direction: column; gap: 8px; }
.fill-blank-wrap input {
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 1rem;
  padding: 12px 16px;
  outline: none;
  font-family: var(--font);
  transition: border .2s;
}
.fill-blank-wrap input:focus { border-color: var(--gold); }

/* Arrange/drag */
.arrange-wrap { display: flex; flex-direction: column; gap: 8px; }
.arrange-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  cursor: grab;
  user-select: none;
  transition: all .15s;
}
.arrange-item:active { cursor: grabbing; opacity: .7; }
.arrange-item.drag-over { border-color: var(--gold); background: rgba(212,160,23,.08); }
.arrange-handle { color: var(--text3); font-size: 1.1rem; }
.arrange-badge {
  background: var(--gold-dark);
  color: #000;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 8px;
  min-width: 22px;
  text-align: center;
}

/* Long answer */
.long-answer-wrap textarea {
  width: 100%;
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.95rem;
  padding: 12px 16px;
  outline: none;
  font-family: var(--font);
  min-height: 120px;
  resize: vertical;
  transition: border .2s;
}
.long-answer-wrap textarea:focus { border-color: var(--gold); }

/* Tick boxes (multi-select) */
.tick-options { display: flex; flex-direction: column; gap: 9px; }
.tick-option {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.tick-option:hover { border-color: var(--gold-dark); }
.tick-option.selected { border-color: var(--gold); background: rgba(212,160,23,.08); }
.tick-box {
  width: 20px; height: 20px;
  border-radius: 4px;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 0.8rem;
  transition: all .15s;
}
.tick-option.selected .tick-box { background: var(--gold); border-color: var(--gold); color: #000; }

/* True/False */
.tf-wrap { display: flex; gap: 12px; }
.tf-btn {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  font-family: var(--font);
}
.tf-btn:hover { border-color: var(--gold-dark); }
.tf-btn.selected { border-color: var(--gold); background: rgba(212,160,23,.08); color: var(--gold); }

/* Match pairs */
.match-wrap { display: flex; flex-direction: column; gap: 10px; }
.match-row { display: flex; align-items: center; gap: 10px; }
.match-left {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 13px;
  font-size: 0.9rem;
}
.match-arrow { color: var(--text3); }
.match-right select {
  flex: 1;
  background: var(--bg3);
  border: 2px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 9px 11px;
  font-family: var(--font);
  outline: none;
  transition: border .2s;
}
.match-right select:focus { border-color: var(--gold); }

/* ─── RESULT CARD ─── */
.result-hero {
  text-align: center;
  padding: 32px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 20px;
}
.result-hero .score-ring {
  width: 120px; height: 120px;
  border-radius: 50%;
  border: 6px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  margin: 0 auto 16px;

  }

    return snap.docs.map(d => ({ id: d.id, ...d.data() }));

    batch.set(fs.collection('batches').doc('b_batch2'), {

    });
    batch.set(qRef.doc('q_sample4'), {

    batch.set(qRef.doc('q_sample6'), {

      points:3, pairs:[['Forte','Loud'],['Piano','Soft'],['Allegro','Fast'],['Largo','Slow']],

    batch.set(qRef.doc('q_sample7'), {

      points:6, sampleAnswer:'A major scale sounds happy/bright; a minor scale sounds sad/dark. They differ in the 3rd, 6th, and 7th scale degrees.',

      topic:'Lesson 03 Major Scale', difficulty:'hard', createdAt: Date.now()

    // Sample exam

  // ══ USERS ════════════════════════════════
  const Users = {
    async all() {
      const snap = await fs.collection('users').get();
      return snapToArr(snap);
    },
    async byId(id) {
      const doc = await fs.collection('users').doc(id).get();
      return docToObj(doc);
    },
    async byUsername(username) {
      const snap = await fs.collection('users')
        .where('username','==', username.trim().toLowerCase()).limit(1).get();
      return snap.empty ? null : docToObj(snap.docs[0]);
    },
    async students() {
      const snap = await fs.collection('users').where('role','==','student').get();
      return snapToArr(snap);
    },
    async inBatch(batchId) {
      const snap = await fs.collection('users')
        .where('role','==','student').where('batchId','==',batchId).get();
      return snapToArr(snap);
    },
    async save(user) {
      const { id, ...data } = user;
      if (id) {
        await fs.collection('users').doc(id).set(data, { merge: true });
        return id;
      } else {
        const ref = await fs.collection('users').add({ ...data, createdAt: Date.now() });
        return ref.id;
      }
    },
    async delete(id) {
      await fs.collection('users').doc(id).delete();
    },
  };

  // ══ BATCHES ══════════════════════════════
  const Batches = {
    async all() {
      const snap = await fs.collection('batches').orderBy('createdAt').get();
      return snapToArr(snap);
    },
    async byId(id) {
      const doc = await fs.collection('batches').doc(id).get();
      return docToObj(doc);
    },
    async save(b) {
      const { id, ...data } = b;
      if (id) {
        await fs.collection('batches').doc(id).set(data, { merge: true });
        return id;

      return snapToArr(snap);
    },
    async byId(id) {
      const doc = await fs.collection('questions').doc(id).get();
      return docToObj(doc);
    },
    async byIds(ids) {
      if (!ids || !ids.length) return [];
      // Firestore 'in' supports max 30 per query
      const chunks = [];
      for (let i = 0; i < ids.length; i += 30) chunks.push(ids.slice(i, i+30));
      const results = [];
      for (const chunk of chunks) {
        const snap = await fs.collection('questions').where(firebase.firestore.FieldPath.documentId(),'in',chunk).get();
        snapToArr(snap).forEach(q => results.push(q));
      }
      // Return in original order
      return ids.map(id => results.find(q => q.id === id)).filter(Boolean);
    },
    async topics() {
      const snap = await fs.collection('questions').get();
      const topics = [...new Set(snap.docs.map(d => d.data().topic).filter(Boolean))];
      return topics.sort();

      const snap = await fs.collection('questions').where('topic','==',topic).get();

    async all() {

      return snapToArr(snap);
    },
    async byId(id) {
      const doc = await fs.collection('exams').doc(id).get();
      return docToObj(doc);
    },
    async forBatch(batchId) {
      // Exams for specific batch OR all batches
      const [specific, all] = await Promise.all([
        fs.collection('exams').where('batchId','==',batchId).get(),
        fs.collection('exams').where('batchId','==','all').get(),
      ]);
      const map = {};
      [...snapToArr(specific), ...snapToArr(all)].forEach(e => map[e.id] = e);
      return Object.values(map).sort((a,b) => b.createdAt - a.createdAt);
    },
    async save(e) {
      const { id, ...data } = e;
      if (id) {
        await fs.collection('exams').doc(id).set(data, { merge: true });
        return id;
      } else {
        const ref = await fs.collection('exams').add({ ...data, createdAt: Date.now() });
        return ref.id;
      }
    },
    async delete(id) {
      await fs.collection('exams').doc(id).delete();
    },
  };

  // ══ ATTEMPTS ═════════════════════════════
  const Attempts = {
    async all() {
      const snap = await fs.collection('attempts').get();
      return snapToArr(snap);
    },
    async byId(id) {
      const doc = await fs.collection('attempts').doc(id).get();
      return docToObj(doc);
    },
    async byStudent(studentId) {
      const snap = await fs.collection('attempts').where('studentId','==',studentId).get();
      return snapToArr(snap);
    },
    async byExam(examId) {
      const snap = await fs.collection('attempts').where('examId','==',examId).get();
      return snapToArr(snap);
    },
    async byStudentExam(studentId, examId) {
      const snap = await fs.collection('attempts')
        .where('studentId','==',studentId).where('examId','==',examId).get();
      return snapToArr(snap);
    },
    async save(a) {
      const { id, ...data } = a;
      if (id) {
        await fs.collection('attempts').doc(id).set(data, { merge: true });
        return id;
      } else {
        const ref = await fs.collection('attempts').add(data);
        return ref.id;
      }
    },

    // Best attempt per student for one exam — sorted by score
    async leaderboard(examId) {
      const attempts = (await Attempts.byExam(examId)).filter(a => a.status === 'submitted');
      const best = {};
      attempts.forEach(a => {
        if (!best[a.studentId] || a.score > best[a.studentId].score) best[a.studentId] = a;
      });
      const rows = Object.values(best).sort((a,b) => b.score - a.score || a.timeTaken - b.timeTaken);
      // Fetch students
      const students = await Promise.all(rows.map(a => Users.byId(a.studentId)));
      return rows.map((a,i) => ({ rank: i+1, attempt: a, student: students[i] }));
    },

    // Global: total score per student across all exams
    async globalLeaderboard() {
      const all = (await Attempts.all()).filter(a => a.status === 'submitted');
      const totals = {};
      all.forEach(a => {
        if (!totals[a.studentId]) totals[a.studentId] = { total:0, count:0, studentId: a.studentId };
        totals[a.studentId].total += (a.score||0);
        totals[a.studentId].count++;
      });
      const rows = Object.values(totals).sort((a,b) => b.total - a.total);
      const students = await Promise.all(rows.map(r => Users.byId(r.studentId)));
      return rows.map((r,i) => ({ rank:i+1, ...r, student: students[i] }));
    },
  };

  return { seed, uid, Users, Batches, Questions, Exams, Attempts };
})();


/* ═══════════════════════════════════════════
   auth.js — Authentication
   Strategy: store username+passwordHash in Firestore,
   use Firebase Anonymous Auth as session carrier.
   (No email needed — username-based login)
═══════════════════════════════════════════ */

const Auth = (() => {

  let _currentUser = null; // cached { id, role, name, username, batchId, ... }

  // SHA-256 via SubtleCrypto
  async function sha256(str) {
    const buf  = new TextEncoder().encode(str);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function login(username, password, expectedRole) {
    // Must authenticate FIRST — Firestore rules require request.auth != null
    // for ANY read, including the username lookup itself.
    if (!fbAuth.currentUser) {
      await fbAuth.signInAnonymously();
    }

    const hash = await sha256(password);
    const user = await DB.Users.byUsername(username);
    if (!user)                       return { ok:false, msg:'Username not found.' };
    if (user.passwordHash !== hash)  return { ok:false, msg:'Incorrect password.' };
    if (user.role !== expectedRole)  return { ok:false, msg:`This account is not a ${expectedRole}.` };

    // Store our app user in sessionStorage for fast access
    sessionStorage.setItem('examhub_user', JSON.stringify(user));
    _currentUser = user;
    return { ok:true, user };
  }

  async function logout() {
    await fbAuth.signOut();
    sessionStorage.removeItem('examhub_user');
    _currentUser = null;
  }

  function current() {
    if (_currentUser) return _currentUser;
    try {
      const s = sessionStorage.getItem('examhub_user');
      if (s) { _currentUser = JSON.parse(s); return _currentUser; }
    } catch {}
    return null;
  }

  // Reload user from Firestore (after edits by teacher)
  async function refresh() {
    const u = current();
    if (!u) return null;
    const fresh = await DB.Users.byId(u.id);
    if (fresh) {
      _currentUser = fresh;
      sessionStorage.setItem('examhub_user', JSON.stringify(fresh));
    }
    return fresh;
  }

  async function changePassword(userId, newPassword) {
    const hash = await sha256(newPassword);
    await DB.Users.save({ id: userId, passwordHash: hash });
    return true;
  }

  function requireRole(role) {
    const u = current();
    return u && u.role === role ? u : null;
  }

  return { login, logout, current, refresh, requireRole, sha256, changePassword };
})();


/* ═══════════════════════════════════════════
   utils.js — Shared Utilities
═══════════════════════════════════════════ */

const Utils = (() => {

  // ── TOAST ───────────────────────────────
  let toastTimer;
  function toast(msg, type = 'info', ms = 3000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.add('hidden'), ms);
  }

  // ── MODAL ───────────────────────────────
  function modal(html, wide = false) {
    const box = document.getElementById('modal-box');
    box.style.maxWidth = wide ? '900px' : '700px';
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal-overlay').classList.remove('hidden');
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
    document.getElementById('modal-content').innerHTML = '';
  }

  // ── SCREENS ─────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── RENDER VIEW ─────────────────────────
  function renderIn(containerId, html) {
    document.getElementById(containerId).innerHTML = html;
  }

  // ── ACTIVE NAV ──────────────────────────
  function setActiveNav(scope, view) {
    document.querySelectorAll(`#${scope}-sidebar .nav-item`).forEach(a => {
      a.classList.toggle('active', a.dataset.view === view);
    });
  }

  // ── FORMAT HELPERS ───────────────────────
  function fmtDate(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }
  function fmtTime(secs) {
    const m = Math.floor(secs / 60).toString().padStart(2,'0');
    const s = (secs % 60).toString().padStart(2,'0');
    return `${m}:${s}`;
  }
  function scoreColor(pct) {
    if (pct >= 80) return 'score-excellent';
    if (pct >= 50) return 'score-good';
    return 'score-fail';
  }
  function pct(score, total) {
    if (!total) return 0;
    return Math.round((score / total) * 100);
  }
  function grade(pctVal) {
    if (pctVal >= 90) return 'A+';
    if (pctVal >= 80) return 'A';
    if (pctVal >= 70) return 'B';
    if (pctVal >= 60) return 'C';
    if (pctVal >= 50) return 'D';
    return 'F';
  }

  // ── SANITIZE ─────────────────────────────
  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── SHUFFLE ──────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ── CONFIRM DIALOG ───────────────────────
  function confirm(msg, onYes) {
    modal(`
      <h3 style="margin-bottom:14px;">Confirm</h3>
      <p style="color:var(--text2);margin-bottom:22px;">${esc(msg)}</p>
      <div class="form-actions">
        <button class="btn-secondary" onclick="Utils.closeModal()">Cancel</button>
        <button class="btn-danger" id="confirm-yes">Confirm</button>
      </div>
    `);
    document.getElementById('confirm-yes').onclick = () => { closeModal(); onYes(); };
  }

  // ── EMPTY STATE ───────────────────────────
  function empty(icon, msg) {
    return `<div class="empty-state"><div class="e-icon">${icon}</div><p>${msg}</p></div>`;
  }

  return { toast, modal, closeModal, showScreen, renderIn, setActiveNav,
           fmtDate, fmtTime, scoreColor, pct, grade, esc, shuffle, confirm, empty };
})();

  _mcqFields(q) {

    return `

    <div class="form-group">
      <label>Correct Answer *</label>
      <input id="fill-answer" value="${Utils.esc(q?.answer||'')}" placeholder="Enter the exact correct answer..." />
    </div>
    <div class="form-group mt-16">
      <label>Accept Variations? (comma-separated)</label>
      <input id="fill-variants" value="${Utils.esc((q?.variants||[]).join(', '))}" placeholder="e.g. Re, ray, RAY" />
    </div>`;
  },

  _tickFields(q) {
    const opts = q?.options || ['','','',''];
    const corr = q?.correctIndices || [];
    return `
    <p class="text-muted mb-16">Check ALL correct answers.</p>
    <div class="options-builder" id="tick-opts">
      ${opts.map((o,i) => `
        <div class="option-row" data-idx="${i}">
          <input type="checkbox" class="correct-radio" style="accent-color:var(--gold);width:16px;height:16px;" ${corr.includes(i)?'checked':''} title="Correct" />
          <input type="text" class="tick-opt-input" value="${Utils.esc(o)}" placeholder="Option ${String.fromCharCode(65+i)}" />
          <button class="btn-ghost btn-sm" onclick="QTypes.removeOpt(this)">✕</button>
        </div>`).join('')}
    </div>
    <button class="btn-ghost btn-sm mt-16" onclick="QTypes.addTickOpt()">+ Add Option</button>`;
  },

  _tfFields(q) {
    return `
    <div class="form-group">
      <label>Correct Answer</label>
      <select id="tf-answer">
        <option value="true"  ${q?.correct===true ?'selected':''}>True</option>
        <option value="false" ${q?.correct===false?'selected':''}>False</option>
      </select>
    </div>`;
  },

  _arrangeFields(q) {
    const items = q?.correctOrder || ['','','',''];
    return `
    <p class="text-muted mb-16">Enter items in the CORRECT order. Students will see them shuffled.</p>
    <div class="options-builder" id="arrange-opts">
      ${items.map((item,i) => `
        <div class="option-row" data-idx="${i}">
          <span style="color:var(--gold);font-weight:700;min-width:20px;">${i+1}.</span>

    </div>
    <button class="btn-ghost btn-sm mt-16" onclick="QTypes.addArrOpt()">+ Add Item</button>`;
  },

  _matchFields(q) {
    const pairs = q?.pairs || [['',''],['',''],['','']];
    return `
    <p class="text-muted mb-16">Enter pairs. Left column = prompts, Right column = answers.</p>
    <div class="options-builder" id="match-opts">
      ${pairs.map((p,i) => `
        <div class="option-row" data-idx="${i}">
          <input type="text" class="match-left-input" value="${Utils.esc(p[0])}" placeholder="Left ${i+1}" />
          <span style="color:var(--text3);">→</span>
          <input type="text" class="match-right-input" value="${Utils.esc(p[1])}" placeholder="Right ${i+1}" />

        </div>`).join('')}
    </div>
    <button class="btn-ghost btn-sm mt-16" onclick="QTypes.addMatchPair()">+ Add Pair</button>`;
  },

  _longFields(q) {
    return `
    <div class="form-group">
      <label>Sample / Model Answer (for teacher reference)</label>
      <textarea id="long-sample" rows="4" placeholder="Enter a sample answer for grading reference...">${Utils.esc(q?.sampleAnswer||'')}</textarea>
    </div>
    <div class="form-group mt-16">
      <label>Grading Note (shown to teacher when marking)</label>
      <input id="long-rubric" value="${Utils.esc(q?.rubric||'')}" placeholder="e.g. Award 2pts for concept, 2pts for example..." />
    </div>
    <p class="text-muted mt-16">⚠️ Written answers require manual grading by the teacher.</p>`;
  },

  // Option add/remove helpers
  removeOpt(btn) { btn.closest('.option-row').remove(); },
  addMcqOpt() {
    const c = document.getElementById('mcq-opts').children.length;
    const row = document.createElement('div');
    row.className = 'option-row';
    row.innerHTML = `<input type="radio" name="mcq-correct" class="correct-radio" value="${c}" title="Mark as correct" /><input type="text" class="mcq-opt-input" placeholder="Option ${String.fromCharCode(65+c)}" /><button class="btn-ghost btn-sm" onclick="QTypes.removeOpt(this)">✕</button>`;
    document.getElementById('mcq-opts').appendChild(row);
  },
  addTickOpt() {
    const c = document.getElementById('tick-opts').children.length;
    const row = document.createElement('div');
    row.className = 'option-row';
    row.innerHTML = `<input type="checkbox" class="correct-radio" style="accent-color:var(--gold);width:16px;height:16px;" /><input type="text" class="tick-opt-input" placeholder="Option ${String.fromCharCode(65+c)}" /><button class="btn-ghost btn-sm" onclick="QTypes.removeOpt(this)">✕</button>`;
    document.getElementById('tick-opts').appendChild(row);
  },
  addArrOpt() {
    const c = document.getElementById('arrange-opts').children.length;
    const row = document.createElement('div');
    row.className = 'option-row';
    row.innerHTML = `<span style="color:var(--gold);font-weight:700;min-width:20px;">${c+1}.</span><input type="text" class="arr-item-input" placeholder="Item ${c+1}" /><button class="btn-ghost btn-sm" onclick="QTypes.removeOpt(this)">✕</button>`;
    document.getElementById('arrange-opts').appendChild(row);
  },
  addMatchPair() {
    const c = document.getElementById('match-opts').children.length;
    const row = document.createElement('div');
    row.className = 'option-row';
    row.innerHTML = `<input type="text" class="match-left-input" placeholder="Left ${c+1}" /><span style="color:var(--text3);">→</span><input type="text" class="match-right-input" placeholder="Right ${c+1}" /><button class="btn-ghost btn-sm" onclick="QTypes.removeOpt(this)">✕</button>`;
    document.getElementById('match-opts').appendChild(row);
  },
  _bindArrange() {},
  _bindMatchPairs() {},

  // ─── COLLECT FORM DATA ───────────────────
  collectQuestion(existingId) {
    const type  = document.querySelector('.qb-type-btn.selected')?.dataset.qtype || 'mcq';
    const text  = document.getElementById('qb-text')?.value.trim();
    const topic = document.getElementById('qb-topic')?.value.trim();
    const diff  = document.getElementById('qb-difficulty')?.value;
    const pts   = parseInt(document.getElementById('qb-points')?.value) || 2;

    if (!text) { Utils.toast('Question text is required.','error'); return null; }

    const q = { id: existingId||'', type, text, topic, difficulty:diff, points:pts };

    switch(type) {
      case 'mcq': {
        const opts = [...document.querySelectorAll('.mcq-opt-input')].map(i => i.value.trim());
        const corr = document.querySelector('input[name="mcq-correct"]:checked');
        if (opts.length < 2) { Utils.toast('Add at least 2 options.','error'); return null; }
        if (!corr) { Utils.toast('Select the correct answer.','error'); return null; }
        q.options = opts; q.correctIndex = parseInt(corr.value); break;
      }
      case 'fill': {
        const ans = document.getElementById('fill-answer')?.value.trim();
        if (!ans) { Utils.toast('Enter the correct answer.','error'); return null; }
        const vars = document.getElementById('fill-variants')?.value.split(',').map(s=>s.trim()).filter(Boolean);
        q.answer = ans; q.variants = vars; break;
      }
      case 'tick': {
        const opts = [...document.querySelectorAll('.tick-opt-input')].map(i => i.value.trim());
        const corr = [...document.querySelectorAll('#tick-opts .correct-radio')].map((c,i) => c.checked?i:-1).filter(i=>i>=0);
        if (opts.length < 2) { Utils.toast('Add at least 2 options.','error'); return null; }
        if (!corr.length) { Utils.toast('Check at least one correct answer.','error'); return null; }
        q.options = opts; q.correctIndices = corr; break;
      }
      case 'tf': {
        q.correct = document.getElementById('tf-answer')?.value === 'true'; break;
      }
      case 'arrange': {
        const items = [...document.querySelectorAll('.arr-item-input')].map(i => i.value.trim()).filter(Boolean);
        if (items.length < 2) { Utils.toast('Add at least 2 items.','error'); return null; }
        q.correctOrder = items; q.items = [...items]; break;
      }
      case 'match': {
        const lefts  = [...document.querySelectorAll('.match-left-input')].map(i => i.value.trim());
        const rights = [...document.querySelectorAll('.match-right-input')].map(i => i.value.trim());
        const pairs  = lefts.map((l,i) => [l, rights[i]]).filter(p => p[0] && p[1]);
        if (pairs.length < 2) { Utils.toast('Add at least 2 pairs.','error'); return null; }
        q.pairs = pairs; break;
      }
      case 'long': {
        q.sampleAnswer = document.getElementById('long-sample')?.value.trim();
        q.rubric       = document.getElementById('long-rubric')?.value.trim();
        q.manualGrade  = true; break;
      }
    }
    return q;
  },

  saveQuestion(existingId) {
    const q = QTypes.collectQuestion(existingId);
    if (!q) return;
    DB.Questions.save(q);
    Utils.closeModal();
    Utils.toast('Question saved!','success');
    // refresh question bank view if open
    if (typeof TeacherViews !== 'undefined') TeacherViews.refresh();
  },
};


/* ═══════════════════════════════════════════
   exam-engine.js — Exam Taking & Auto-Scoring
   Async version for Firestore
═══════════════════════════════════════════ */

const ExamEngine = (() => {

  let state = null;

  // ─── START EXAM ──────────────────────────
  async function start(examId, studentId) {
    Utils.showLoadingOverlay('Loading exam…');
    try {
      const exam = await DB.Exams.byId(examId);
      if (!exam) { Utils.toast('Exam not found.','error'); return; }

      // Check already submitted
      const prevAtts = await DB.Attempts.byStudentExam(studentId, examId);
      const prev     = prevAtts.find(a => a.status === 'submitted');
      if (prev) { Utils.hideLoadingOverlay(); showResult(prev.id); return; }

      // Load questions
      let qs = await DB.Questions.byIds(exam.questionIds);
      if (exam.shuffle) qs = Utils.shuffle(qs);

      // Resume or create attempt
      let attempt = prevAtts.find(a => a.status === 'in-progress');
      if (!attempt) {
        const newAtt = { examId, studentId, answers:{}, startAt: Date.now(), status:'in-progress', timeTaken:0 };
        const newId  = await DB.Attempts.save(newAtt);
        attempt = { ...newAtt, id: newId };
      }

      state = {
        exam, questions: qs, attempt,
        currentIdx: 0,
        timerSecs: exam.duration ? exam.duration * 60 : null,
        timerInterval: null,
      };

      Utils.hideLoadingOverlay();
      Utils.showScreen('screen-exam');
      renderQuestion();
      startTimer();
    } catch(e) {
      Utils.hideLoadingOverlay();
      Utils.toast('Failed to load exam: ' + e.message, 'error');
    }
  }

  // ─── TIMER ───────────────────────────────
  function startTimer() {
    if (!state.timerSecs) {
      document.getElementById('exam-timer').textContent = '⏱ No Limit';
      return;
    }
    clearInterval(state.timerInterval);
    state.timerInterval = setInterval(() => {
      state.timerSecs--;
      updateTimerUI();
      if (state.timerSecs <= 0) { clearInterval(state.timerInterval); submitExam(); }
    }, 1000);
  }
  function updateTimerUI() {
    const el = document.getElementById('exam-timer');
    if (!el) return;
    el.textContent = '⏱ ' + Utils.fmtTime(state.timerSecs);
    el.className = 'timer-badge' + (state.timerSecs < 60 ? ' danger' : state.timerSecs < 180 ? ' warn' : '');
  }

  // ─── RENDER QUESTION ─────────────────────
  function renderQuestion() {
    const { questions, currentIdx, attempt, exam } = state;
    const q     = questions[currentIdx];
    const total = questions.length;
    const saved = attempt.answers[q.id];

    document.getElementById('exam-taking-title').textContent = exam.title;
    document.getElementById('exam-progress').textContent     = `Q ${currentIdx+1} / ${total}`;
    document.getElementById('exam-prog-fill').style.width    = `${((currentIdx+1)/total)*100}%`;

    // dots
    document.getElementById('exam-q-dots').innerHTML = questions.map((qq,i) => `
      <div class="q-dot ${i===currentIdx?'current':''} ${attempt.answers[qq.id]!==undefined?'answered':''}"
           onclick="ExamEngine.goTo(${i})">${i+1}</div>`).join('');

    document.getElementById('exam-prev').disabled    = currentIdx === 0;
    document.getElementById('exam-next').textContent = currentIdx === total-1 ? '✅ Submit' : 'Next →';

    document.getElementById('exam-body').innerHTML = `
      <div class="q-card">
        <div class="q-card-head">
          <span class="q-num">Q${currentIdx+1} · ${q.points} pt${q.points>1?'s':''}</span>
          <span class="q-text">${Utils.esc(q.text)}</span>
        </div>
        <div class="divider"></div>
        ${renderWidget(q, saved)}
      </div>`;

    bindEvents(q);
  }

  function renderWidget(q, saved) {
    switch(q.type) {
      case 'mcq': return `<div class="mcq-options">${(q.options||[]).map((opt,i)=>`
        <div class="mcq-option${saved===i?' selected':''}" data-idx="${i}">
          <div class="opt-letter">${String.fromCharCode(65+i)}</div>
          <div>${Utils.esc(opt)}</div>
        </div>`).join('')}</div>`;

      case 'fill': return `<div class="fill-blank-wrap">
        <input id="fill-inp" type="text" value="${Utils.esc(saved||'')}" placeholder="Type your answer here…" />
        </div>`;

      case 'tick': {
        const sel = saved||[];
        return `<p class="text-muted mb-16" style="font-size:.8rem;">Select ALL correct answers</p>
        <div class="tick-options">${(q.options||[]).map((opt,i)=>`
          <div class="tick-option${sel.includes(i)?' selected':''}" data-idx="${i}">
            <div class="tick-box">${sel.includes(i)?'✓':''}</div>
            <div>${Utils.esc(opt)}</div>
          </div>`).join('')}</div>`; }

      case 'tf': return `<div class="tf-wrap">
        <button class="tf-btn${saved===true?' selected':''}" data-val="true">✅ True</button>
        <button class="tf-btn${saved===false?' selected':''}" data-val="false">❌ False</button>
        </div>`;

      case 'arrange': {
        const order = saved || Utils.shuffle([...(q.correctOrder||[])]);
        if (!saved) saveAnswer(q.id, order);
        return `<p class="text-muted mb-16" style="font-size:.8rem;">Drag to arrange in the correct order</p>
        <div class="arrange-wrap" id="arrange-list">
          ${order.map((item,i)=>`
            <div class="arrange-item" draggable="true" data-item="${Utils.esc(item)}">
              <span class="arrange-handle">⠿</span>
              <span class="arrange-badge">${i+1}</span>
              <span>${Utils.esc(item)}</span>
            </div>`).join('')}
        </div>`; }

      case 'match': {
        const rights   = Utils.shuffle((q.pairs||[]).map(p=>p[1]));
        const savedMap = saved||{};
        return `<div class="match-wrap">${(q.pairs||[]).map(p=>`
          <div class="match-row">
            <div class="match-left">${Utils.esc(p[0])}</div>
            <span class="match-arrow">→</span>
            <div class="match-right">
              <select data-left="${Utils.esc(p[0])}" style="flex:1">
                <option value="">-- Select --</option>
                ${rights.map(r=>`<option value="${Utils.esc(r)}" ${savedMap[p[0]]===r?'selected':''}>${Utils.esc(r)}</option>`).join('')}
              </select>
            </div>
          </div>`).join('')}</div>`; }

      case 'long': return `<div class="long-answer-wrap">
        <textarea id="long-inp" placeholder="Write your answer here…">${Utils.esc(saved||'')}</textarea>
        </div>`;

      default: return '<p>Unknown question type</p>';
    }
  }

  function bindEvents(q) {
    switch(q.type) {
      case 'mcq':
        document.querySelectorAll('.mcq-option').forEach(el => {
          el.addEventListener('click', () => {
            document.querySelectorAll('.mcq-option').forEach(x=>x.classList.remove('selected'));
            el.classList.add('selected');
            saveAnswer(q.id, parseInt(el.dataset.idx));
          });
        }); break;
      case 'fill':
        document.getElementById('fill-inp')?.addEventListener('input', e => saveAnswer(q.id, e.target.value)); break;
      case 'tick':
        document.querySelectorAll('.tick-option').forEach(el => {
          el.addEventListener('click', () => {
            el.classList.toggle('selected');
            el.querySelector('.tick-box').textContent = el.classList.contains('selected')?'✓':'';
            const sel = [...document.querySelectorAll('.tick-option.selected')].map(x=>parseInt(x.dataset.idx));
            saveAnswer(q.id, sel);
          });
        }); break;
      case 'tf':
        document.querySelectorAll('.tf-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.tf-btn').forEach(x=>x.classList.remove('selected'));
            btn.classList.add('selected');
            saveAnswer(q.id, btn.dataset.val==='true');
          });
        }); break;
      case 'arrange': bindDragDrop(q); break;
      case 'match':
        document.querySelectorAll('.match-right select').forEach(sel => {
          sel.addEventListener('change', () => {
            const map = {};
            document.querySelectorAll('.match-right select').forEach(s=>{ map[s.dataset.left]=s.value; });
            saveAnswer(q.id, map);
          });
        }); break;
      case 'long':
        document.getElementById('long-inp')?.addEventListener('input', e => saveAnswer(q.id, e.target.value)); break;
    }
  }

  function bindDragDrop(q) {
    const list = document.getElementById('arrange-list');
    if (!list) return;
    let dragEl = null;
    list.querySelectorAll('.arrange-item').forEach(item => {
      item.addEventListener('dragstart', ()=>{ dragEl=item; item.style.opacity='.4'; });
      item.addEventListener('dragend',   ()=>{ item.style.opacity='1'; dragEl=null; updateBadges(); });
      item.addEventListener('dragover',  e=>{ e.preventDefault(); item.classList.add('drag-over'); });
      item.addEventListener('dragleave', ()=>item.classList.remove('drag-over'));
      item.addEventListener('drop', e=>{
        e.preventDefault(); item.classList.remove('drag-over');
        if (dragEl && dragEl!==item) list.insertBefore(dragEl,item);
        const order=[...list.querySelectorAll('.arrange-item')].map(i=>i.dataset.item);
        saveAnswer(q.id, order); updateBadges();
      });
    });
  }
  function updateBadges() {
    document.querySelectorAll('#arrange-list .arrange-badge').forEach((b,i)=>b.textContent=i+1);
  }

  // ─── SAVE ANSWER (local state + Firestore) ──
  async function saveAnswer(qId, value) {
    state.attempt.answers[qId] = value;
    // Update dot immediately
    document.querySelectorAll('.q-dot').forEach((dot,i) => {
      const qq = state.questions[i];
      if (qq) dot.classList.toggle('answered', state.attempt.answers[qq.id] !== undefined);
    });
    // Persist to Firestore (fire and forget — don't await UI)
    DB.Attempts.save({ id: state.attempt.id, answers: state.attempt.answers });
  }

  // ─── NAV ─────────────────────────────────
  function next() {
    const { questions, currentIdx } = state;
    if (currentIdx < questions.length-1) { state.currentIdx++; renderQuestion(); }
    else promptSubmit();
  }
  function prev() { if (state.currentIdx>0){ state.currentIdx--; renderQuestion(); } }
  function goTo(idx) { state.currentIdx=idx; renderQuestion(); }

  function promptSubmit() {
    const unanswered = state.questions.filter(q => state.attempt.answers[q.id]===undefined).length;
    Utils.modal(`
      <h3 style="margin-bottom:14px;">Submit Exam?</h3>
      ${unanswered ? `<p class="error-msg" style="margin-bottom:14px;">⚠️ ${unanswered} unanswered question${unanswered>1?'s':''}.</p>`:'' }
      <p style="color:var(--text2);margin-bottom:22px;">Once submitted, you cannot change your answers.</p>
      <div class="form-actions">
        <button class="btn-secondary" onclick="Utils.closeModal()">Keep Reviewing</button>
        <button class="btn-primary" onclick="Utils.closeModal();ExamEngine.submitExam()">Submit Exam</button>
      </div>`);
  }

  // ─── SUBMIT & SCORE ──────────────────────
  async function submitExam() {
    clearInterval(state.timerInterval);
    Utils.showLoadingOverlay('Submitting…');
    const { exam, questions, attempt } = state;
    const timeTaken = Math.round((Date.now() - attempt.startAt)/1000);

    let autoScore = 0;
    const results = {};
    questions.forEach(q => {
      if (q.manualGrade) { results[q.id]={ manualGrade:true, score:0 }; return; }
      const { correct } = gradeQ(q, attempt.answers[q.id]);
      results[q.id] = { correct };
      if (correct) autoScore += q.points;
    });

    const maxScore = questions.reduce((s,q)=>s+q.points,0);
    const updated  = {
      ...attempt,
      status:'submitted', timeTaken, score:autoScore,
      maxScore, results, submittedAt: Date.now()
    };
    await DB.Attempts.save(updated);
    state.attempt = updated;
    Utils.hideLoadingOverlay();
    showResult(attempt.id);
  }

  function gradeQ(q, ans) {
    if (ans===undefined||ans===null||ans==='') return { correct:false };
    switch(q.type) {
      case 'mcq': return { correct: ans===q.correctIndex };
      case 'tf':  return { correct: ans===q.correct };
      case 'fill': {
        const norm = s=>String(s).trim().toLowerCase();
        return { correct: [q.answer,...(q.variants||[])].map(norm).includes(norm(ans)) };
      }
      case 'tick': {
        const a=[...(ans||[])].sort().join(','), b=[...(q.correctIndices||[])].sort().join(',');
        return { correct: a===b };
      }
      case 'arrange': return { correct: (ans||[]).join('|')===(q.correctOrder||[]).join('|') };
      case 'match':   return { correct: (q.pairs||[]).every(p=>ans[p[0]]===p[1]) };
      default: return { correct:false };
    }
  }

  // ─── SHOW RESULT ─────────────────────────
  async function showResult(attemptId) {
    clearInterval(state?.timerInterval);
    Utils.showLoadingOverlay('Loading results…');
    try {
      const attempt = await DB.Attempts.byId(attemptId);
      const exam    = await DB.Exams.byId(attempt.examId);
      const qs      = await DB.Questions.byIds(exam.questionIds);
      const p       = Utils.pct(attempt.score, attempt.maxScore);
      const passed  = attempt.score >= (exam.passMark||0);
      const g       = Utils.grade(p);

      const reviewHTML = qs.map((q,i) => {
        if (q.manualGrade) return `
          <div class="review-q">
            <div class="rq-head"><span class="rq-icon">📝</span><span class="rq-text">Q${i+1}. ${Utils.esc(q.text)}</span></div>
            <div class="review-answer">
              <div class="ra-label">Your Answer</div>
              <div class="ra-val">${Utils.esc(attempt.answers?.[q.id]||'(No answer)')}</div>
              <div class="ra-label" style="margin-top:8px;color:var(--warn);">⏳ Awaiting manual grading</div>
            </div>
          </div>`;
        const res  = attempt.results?.[q.id];
        const icon = res?.correct?'✅':'❌';
        return `
          <div class="review-q">
            <div class="rq-head"><span class="rq-icon">${icon}</span><span class="rq-text">Q${i+1}. ${Utils.esc(q.text)}</span></div>
            <div class="review-answer">
              <div class="ra-label">Your Answer</div>
              <div class="ra-val ${res?.correct?'correct':'wrong'}">${fmtAns(q,attempt.answers?.[q.id])}</div>
              ${!res?.correct?`<div class="ra-label" style="margin-top:6px;">Correct Answer</div><div class="ra-val correct">${fmtCorrect(q)}</div>`:''}
            </div>
          </div>`;
      }).join('');

      Utils.hideLoadingOverlay();
      Utils.showScreen('screen-student');
      Utils.renderIn('student-main',`
        <div class="result-hero">
          <div class="score-ring">
            <span class="score-pct">${p}%</span>
            <span class="score-sub">${attempt.score}/${attempt.maxScore}</span>
          </div>
          <h3>${passed?'🎉 Passed!':'😔 Not Passed'}</h3>
          <p>${Utils.esc(exam.title)}</p>
          <p style="margin-top:8px;">Grade: <b>${g}</b> &nbsp;|&nbsp; Time: ${Utils.fmtTime(attempt.timeTaken)} &nbsp;|&nbsp; ${passed?'✅ Passed':'❌ Failed'}</p>
        </div>
        <div class="section">
          <div class="section-head"><h3>Question Review</h3></div>
          <div class="section-body">${reviewHTML}</div>
        </div>
        <div style="text-align:center;margin-top:16px;">
          <button class="btn-secondary" onclick="StudentViews.show('s-dashboard')">← Back to Dashboard</button>
        </div>`);
    } catch(e) {
      Utils.hideLoadingOverlay();
      Utils.toast('Could not load results: '+e.message,'error');
    }
  }

  function fmtAns(q,ans) {
    if (ans===undefined||ans===null) return '(No answer)';
    switch(q.type) {
      case 'mcq':     return q.options?.[ans]||ans;
      case 'tf':      return ans?'True':'False';
      case 'fill':    return ans;
      case 'tick':    return (ans||[]).map(i=>q.options?.[i]).filter(Boolean).join(', ')||'(None)';
      case 'arrange': return (ans||[]).join(' → ');
      case 'match':   return Object.entries(ans||{}).map(([l,r])=>`${l} → ${r}`).join(', ');
      default: return String(ans);
    }
  }
  function fmtCorrect(q) {
    switch(q.type) {
      case 'mcq':     return q.options?.[q.correctIndex]||'?';
      case 'tf':      return q.correct?'True':'False';
      case 'fill':    return q.answer;
      case 'tick':    return (q.correctIndices||[]).map(i=>q.options?.[i]).join(', ');
      case 'arrange': return (q.correctOrder||[]).join(' → ');
      case 'match':   return (q.pairs||[]).map(p=>`${p[0]} → ${p[1]}`).join(', ');
      default: return '?';
    }
  }

  return { start, next, prev, goTo, submitExam, showResult };
})();

  async function saveStudent(id) {
    const name  = document.getElementById('s-name').value.trim();
    const uname = document.getElementById('s-uname').value.trim().toLowerCase();
    const pass  = document.getElementById('s-pass').value;
    const batch = document.getElementById('s-batch').value;
    const email = document.getElementById('s-email').value.trim();
    if (!name||!uname){Utils.toast('Name and username required','error');return;}
    if (!id&&!pass){Utils.toast('Password required for new student','error');return;}
    const existing = await DB.Users.byUsername(uname);
    if (existing&&existing.id!==id){Utils.toast('Username already taken','error');return;}
    const user = (id?await DB.Users.byId(id):null)||{role:'student'};
    user.name=name; user.username=uname; user.batchId=batch; user.email=email;
    if (id) user.id=id;
    if (pass) user.passwordHash=await Auth.sha256(pass);
    await DB.Users.save(user);
    Utils.closeModal(); Utils.toast('Student saved!','success'); renderStudents();
  }

  function renderQList(qs, page) {
    if (!qs.length) return Utils.empty('❓','No questions match your filter.');
    const pages = Math.ceil(qs.length/Q_PER);
    const slice = qs.slice((page-1)*Q_PER, page*Q_PER);
    const cards = slice.map(q=>`
      <div class="q-card">
        <div class="q-card-head">
          <span class="q-num">${Utils.esc(QTypes.label(q.type))} · ${q.points} pts</span>
          <span class="q-text">${Utils.esc(q.text)}</span>
          <div class="q-card-actions">
            <button class="btn-ghost btn-sm" onclick="TeacherViews.editQ('${q.id}')">✏️ Edit</button>
            <button class="btn-danger btn-sm" onclick="TeacherViews.deleteQ('${q.id}')">🗑</button>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${q.topic?`<span class="badge badge-blue">${Utils.esc(q.topic)}</span>`:''}
          <span class="badge badge-grey">${q.difficulty||'—'}</span>
        </div>
      </div>`).join('');
    const pager = pages>1?`<div class="pagination">${Array.from({length:pages},(_,i)=>`
      <button class="page-btn${i+1===page?' active':''}" onclick="TeacherViews.goQPage(${i+1})">${i+1}</button>`).join('')}</div>`:'';
    return cards+pager;
  }

  function filterQs() {
    _qFilter.search = document.getElementById('q-search').value.toLowerCase();
    _qFilter.type   = document.getElementById('q-type').value;
    _qFilter.topic  = document.getElementById('q-topic').value;
    _qPage = 1; updateQList();
  }
  function updateQList() {
    let qs = window._allQs||[];
    if (_qFilter.search) qs=qs.filter(q=>q.text.toLowerCase().includes(_qFilter.search)||(q.topic||'').toLowerCase().includes(_qFilter.search));
    if (_qFilter.type)  qs=qs.filter(q=>q.type===_qFilter.type);
    if (_qFilter.topic) qs=qs.filter(q=>q.topic===_qFilter.topic);
    document.getElementById('q-list').innerHTML = renderQList(qs,_qPage);
  }
  function goQPage(p){ _qPage=p; updateQList(); }

      <div class="form-actions mt-16">

        <button class="btn-primary" onclick="TeacherViews.saveGrades('${attemptId}',${JSON.stringify(manualQs.map(q=>({id:q.id,pts:q.points})))})">Save Grades</button>
      </div>`,true);
  }

  async function saveGrades(attemptId, qMeta) {
    const attempt = await DB.Attempts.byId(attemptId);
    const exam    = await DB.Exams.byId(attempt.examId);
    const allQs   = await DB.Questions.byIds(exam.questionIds);
    if (!attempt.results) attempt.results={};
    qMeta.forEach(({id})=>{
      const score=parseInt(document.getElementById('mg-'+id)?.value)||0;
      attempt.results[id]={manualGrade:true,score};
    });
    // Recalculate total
    let total=0;
    allQs.forEach(q=>{
      if (q.manualGrade) total+=(attempt.results?.[q.id]?.score||0);
      else if (attempt.results?.[q.id]?.correct) total+=q.points;
    });
    attempt.score=total;
    await DB.Attempts.save(attempt);
    Utils.closeModal(); Utils.toast('Grades saved!','success'); renderResults();
  }

  // ── LEADERBOARD ─────────────────────────
  async function renderLeaderboard() {
    loading();
    const [exams, batches] = await Promise.all([DB.Exams.all(), DB.Batches.all()]);
    Utils.renderIn('teacher-main',`
      <div class="page-header"><div><h2>🏆 Leaderboard</h2><p>Top performers</p></div></div>
      <div class="pill-tabs">
        <button class="pill-tab active" onclick="TeacherViews.lbTab('overall',this)">🌟 Overall</button>
        ${exams.map(e=>`<button class="pill-tab" onclick="TeacherViews.lbTab('exam:${e.id}',this)">${Utils.esc(e.title.substring(0,22))}</button>`).join('')}
        ${batches.map(b=>`<button class="pill-tab" onclick="TeacherViews.lbTab('batch:${b.id}',this)">${Utils.esc(b.name.substring(0,18))}</button>`).join('')}
      </div>
      <div id="lb-content"><div class="flex-center" style="height:200px;"><div class="spinner"></div></div></div>`);
    await lbTab('overall', document.querySelector('.pill-tab'));
  }

  async function lbTab(key, btn) {
    document.querySelectorAll('.pill-tab').forEach(b=>b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    const el=document.getElementById('lb-content');
    if (!el) return;
    el.innerHTML='<div class="flex-center" style="height:200px;"><div class="spinner"></div></div>';
    if (key==='overall') { el.innerHTML=await renderLbOverall(); return; }
    const [type,id]=key.split(':');
    if (type==='exam')  el.innerHTML=await renderLbExam(id);
    if (type==='batch') el.innerHTML=await renderLbBatch(id);
  }

  function podium(top3) {
    const medals=['🥇','🥈','🥉'], cls=['p1','p2','p3'];
    return `<div class="lb-podium">${top3.map((e,i)=>e?`
      <div class="lb-place ${cls[i]}">
        <div class="lb-medal">${medals[i]}</div>
        <div class="lb-name">${Utils.esc(e.name)}</div>
        <div class="lb-score">${Utils.esc(e.score)}</div>
      </div>`:'').join('')}</div>`;
  }

  async function renderLbOverall() {
    const rows=await DB.Attempts.globalLeaderboard();
    if (!rows.length) return Utils.empty('🏆','No data yet.');
    const top3=rows.slice(0,3).map(r=>r.student?{name:r.student.name,score:`${r.total} pts`}:null);
    return podium(top3)+`<div class="section"><div class="section-body"><div class="tbl-wrap"><table>
      <thead><tr><th>#</th><th>Student</th><th>Batch</th><th>Exams</th><th>Total Score</th></tr></thead>
      <tbody>${await Promise.all(rows.map(async r=>{
        const b=await DB.Batches.byId(r.student?.batchId);
        return `<tr>
          <td style="font-weight:700;text-align:center;">${r.rank<=3?['🥇','🥈','🥉'][r.rank-1]:r.rank}</td>
          <td><b>${Utils.esc(r.student?.name||'?')}</b></td>
          <td>${Utils.esc(b?.name||'—')}</td>
          <td>${r.count}</td>
          <td><b class="${Utils.scoreColor(r.total/Math.max(r.count,1))}">${r.total}</b></td>
        </tr>`;
      })).then(r=>r.join(''))}</tbody>
    </table></div></div></div>`;
  }

  async function renderLbExam(examId) {
    const [exam, rows]=await Promise.all([DB.Exams.byId(examId), DB.Attempts.leaderboard(examId)]);
    if (!rows.length) return Utils.empty('🏆','No submissions for this exam.');
    const top3=rows.slice(0,3).map(r=>r.student?{name:r.student.name,score:`${Utils.pct(r.attempt.score,r.attempt.maxScore)}%`}:null);
    return `<h3 style="margin-bottom:16px;">${Utils.esc(exam?.title||'')}</h3>`+podium(top3)+`
      <div class="section"><div class="section-body"><div class="tbl-wrap"><table>
        <thead><tr><th>#</th><th>Student</th><th>Score</th><th>%</th><th>Time</th></tr></thead>
        <tbody>${rows.map(r=>{const p=Utils.pct(r.attempt.score,r.attempt.maxScore);return`<tr>
          <td style="font-weight:700;text-align:center;">${r.rank<=3?['🥇','🥈','🥉'][r.rank-1]:r.rank}</td>
          <td><b>${Utils.esc(r.student?.name||'?')}</b></td>
          <td>${r.attempt.score}/${r.attempt.maxScore}</td>
          <td><span class="${Utils.scoreColor(p)}">${p}%</span></td>
          <td>${Utils.fmtTime(r.attempt.timeTaken)}</td>
        </tr>`;}).join('')}</tbody>
      </table></div></div></div>`;
  }

  async function renderLbBatch(batchId) {
    const [batch, students]=await Promise.all([DB.Batches.byId(batchId), DB.Users.inBatch(batchId)]);
    const rows=await Promise.all(students.map(async s=>{
      const atts=(await DB.Attempts.byStudent(s.id)).filter(a=>a.status==='submitted');
      return {student:s,total:atts.reduce((sum,a)=>sum+a.score,0),count:atts.length};
    }));
    const sorted=rows.sort((a,b)=>b.total-a.total).map((r,i)=>({...r,rank:i+1}));
    if (!sorted.length) return Utils.empty('🏆','No data for this batch.');
    const top3=sorted.slice(0,3).map(r=>({name:r.student.name,score:`${r.total} pts`}));
    return `<h3 style="margin-bottom:16px;">${Utils.esc(batch?.name||'')}</h3>`+podium(top3)+`
      <div class="section"><div class="section-body"><div class="tbl-wrap"><table>
        <thead><tr><th>#</th><th>Student</th><th>Exams</th><th>Total Score</th></tr></thead>
        <tbody>${sorted.map(r=>`<tr>
          <td style="font-weight:700;text-align:center;">${r.rank<=3?['🥇','🥈','🥉'][r.rank-1]:r.rank}</td>
          <td><b>${Utils.esc(r.student.name)}</b></td>
          <td>${r.count}</td>
          <td><b>${r.total}</b></td>
        </tr>`).join('')}</tbody>
      </table></div></div></div>`;
  }

  return {
    show, refresh,
    modalBatch, saveBatch, deleteBatch,
    modalStudent, saveStudent, deleteStudent, filterStudents, studentReport,
    modalExam, saveExam, togglePublish, deleteExam, manageQs, toggleExamQ,
    renderQBank, filterQs, goQPage, openAddQ, editQ, deleteQ,
    filterResults, manualGrade, saveGrades,
    lbTab,
  };
})();

    Utils.modal(`
      <h3 style="margin-bottom:10px;">${Utils.esc(exam.title)}</h3>
      <p style="color:var(--text2);margin-bottom:18px;">${Utils.esc(exam.description||'')}</p>
      <div class="stat-grid" style="margin-bottom:18px;">
        <div class="stat-card"><div class="s-icon">❓</div><div class="s-val">${exam.questionIds?.length||0}</div><div class="s-label">Questions</div></div>
        <div class="stat-card"><div class="s-icon">⏱</div><div class="s-val">${exam.duration||'∞'}</div><div class="s-label">Minutes</div></div>
        <div class="stat-card"><div class="s-icon">🎯</div><div class="s-val">${exam.passMark||0}</div><div class="s-label">Pass Mark</div></div>
        <div class="stat-card"><div class="s-icon">📊</div><div class="s-val">${exam.totalMarks||'?'}</div><div class="s-label">Total Marks</div></div>
      </div>
      <p style="color:var(--text3);font-size:0.82rem;margin-bottom:18px;">
        ⚠️ Once you start, the timer begins. Submit before time runs out.
      </p>
      <div class="form-actions">
        <button class="btn-secondary" onclick="Utils.closeModal()">Cancel</button>
        <button class="btn-primary" onclick="Utils.closeModal();ExamEngine.start('${examId}','${Auth.current().id}')">🚀 Begin Exam</button>
      </div>`);
  }

  return { show, promptStart, lbTab };
})();

   app.js — Bootstrap & Event Wiring (Firebase)
═══════════════════════════════════════════ */

// Add loading overlay helpers to Utils
Utils.showLoadingOverlay = function(msg = 'Loading…') {
  let el = document.getElementById('loading-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loading-overlay';
    el.className = 'loading-overlay';
    el.innerHTML = `<div class="spinner"></div><p id="loading-overlay-msg"></p>`;
    document.body.appendChild(el);
  }
  document.getElementById('loading-overlay-msg').textContent = msg;
  el.style.display = 'flex';
};
Utils.hideLoadingOverlay = function() {
  const el = document.getElementById('loading-overlay');
  if (el) el.style.display = 'none';
};

// ── BOOTSTRAP ───────────────────────────────
// Note: DOM is already ready by the time this runs (scripts load dynamically after page load)
(async () => {

  document.getElementById('loading-msg').textContent = 'Connecting to Firebase…';

  try {
    // Must be authenticated before ANY Firestore read/write (rules require it)
    if (!fbAuth.currentUser) {
      await fbAuth.signInAnonymously();
    }
    // Seed sample data (only runs if DB is empty)
    await DB.seed();
    document.getElementById('loading-msg').textContent = 'Ready!';
  } catch(e) {
    document.getElementById('loading-msg').textContent = 'Connection error — check Firebase rules.';
    console.error('Firebase seed error:', e);
  }

  // Check existing session (page refresh)
  const user = Auth.current();
  if (user) {
    if (user.role === 'teacher') enterTeacher();
    else enterStudent(user);
  } else {
    Utils.showScreen('screen-login');
  }

  // ── LOGIN ─────────────────────────────────
  let loginRole = 'student';

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loginRole = btn.dataset.role;
      document.getElementById('login-hint').innerHTML = 'Enter your username &amp; password';
      document.getElementById('login-error').classList.add('hidden');
    });
  });

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('login-username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-password').focus();
  });

  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');
    const btn      = document.getElementById('login-btn');

    if (!username || !password) {
      errEl.textContent = 'Please enter username and password.';
      errEl.classList.remove('hidden');
      return;
    }

    btn.textContent = 'Signing in…';
    btn.disabled    = true;

    try {
      const result = await Auth.login(username, password, loginRole);
      btn.textContent = 'Sign In';
      btn.disabled    = false;

      if (!result.ok) {
        errEl.textContent = result.msg;
        errEl.classList.remove('hidden');
        return;
      }

      errEl.classList.add('hidden');
      document.getElementById('login-password').value = '';

      if (result.user.role === 'teacher') enterTeacher();
      else enterStudent(result.user);

    } catch(e) {
      btn.textContent = 'Sign In';
      btn.disabled    = false;
      errEl.textContent = 'Login failed: ' + e.message;
      errEl.classList.remove('hidden');
    }
  }

  function enterTeacher() {
    Utils.showScreen('screen-teacher');
    TeacherViews.show('t-dashboard');
  }

  function enterStudent(user) {
    document.getElementById('student-name-tag').textContent = '🎓 ' + (user.name || user.username);
    Utils.showScreen('screen-student');
    StudentViews.show('s-dashboard');
  }

  // ── LOGOUTS ──────────────────────────────
  document.getElementById('student-logout').addEventListener('click', async () => {
    await Auth.logout();
    Utils.showScreen('screen-login');
    document.getElementById('login-username').value = '';
  });

  document.getElementById('teacher-logout').addEventListener('click', async () => {
    await Auth.logout();
    Utils.showScreen('screen-login');
    document.getElementById('login-username').value = '';
  });

  // ── SIDEBAR NAV ──────────────────────────
  document.getElementById('student-sidebar').addEventListener('click', e => {
    const item = e.target.closest('.nav-item');
    if (item?.dataset.view) StudentViews.show(item.dataset.view);
  });

  document.getElementById('teacher-sidebar').addEventListener('click', e => {
    const item = e.target.closest('.nav-item');
    if (item?.dataset.view) TeacherViews.show(item.dataset.view);
  });

  // ── EXAM NAVIGATION ──────────────────────
  document.getElementById('exam-next').addEventListener('click', () => ExamEngine.next());
  document.getElementById('exam-prev').addEventListener('click', () => ExamEngine.prev());

  // ── MODAL ────────────────────────────────
  document.getElementById('modal-close').addEventListener('click', Utils.closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) Utils.closeModal();
  });

  // ── KEYBOARD ─────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') Utils.closeModal();
  });

  // Also patch QTypes.saveQuestion to be async-aware
  QTypes.saveQuestion = async function(existingId) {
    const q = QTypes.collectQuestion(existingId);
    if (!q) return;
    const savedId = await DB.Questions.save(q);
    // Update cache
    if (window._allQs) {
      const idx = window._allQs.findIndex(x => x.id === savedId);
      const saved = { ...q, id: savedId };
      if (idx >= 0) window._allQs[idx] = saved;
      else window._allQs.push(saved);
    }
    Utils.closeModal();
    Utils.toast('Question saved!','success');
    TeacherViews.refresh();
  };

})();

  </script>
