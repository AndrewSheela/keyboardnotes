/* ════ TOOLBAR ════ */
#toolbar{

.tb-inner{display:flex;align-items:center;flex-direction:row;gap:8px;flex-wrap:nowrap;width:100%;justify-content:center;}

.tb-group{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tb-label{font-size:10px;font-weight:600;color:#71717A;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}

.tb-btn{
  background:rgba(255,255,255,.08);color:var(--tb-txt);
  border:1px solid rgba(255,255,255,.12);border-radius:10px;
  padding:9px 18px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;

  flex-shrink:0;letter-spacing:.2px;
}
.tb-btn:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.25);transform:translateY(-1px);}
.tb-btn.tp{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#FCD34D;font-size:20px;padding:6px 18px;border-radius:10px;line-height:1;}

/* ════ SHEET ════ */

.sheet-wrap{padding:24px 16px 48px;}
.sheet{background:var(--sheet-bg);max-width:980px;margin:0 auto;border-radius:16px;box-shadow:0 6px 40px rgba(0,0,0,.11);padding:40px 48px 52px;}

.artist-wrap, .album-wrap{display:flex;align-items:center;gap:6px;}

#sheet-artist-display{font-family:'Lora',serif;font-size:13px;font-weight:600;font-style:italic;color:#3B82F6;}
#sheet-album-display{font-family:'Lora',serif;font-size:13px;font-weight:600;font-style:italic;color:#7C3AED;}

.measure-block{display:flex;flex-shrink:0;align-items:flex-start;page-break-inside: avoid; break-inside: avoid;}

.cell-note{font-family:'Courier Prime',monospace;font-size:var(--fs-note);font-weight:700;color:var(--note-color);line-height:1.55;white-space:nowrap;}

.barline{display:flex;flex-direction:column;align-items:center;padding:0 3px;}

function noteToIdx(step,alter){return((STEP_BASE[step]+Math.round(alter||0))%12+12)%12;}
function idxToName(idx,fl){return fl?CHR_FLAT[idx]:CHR_SHARP[idx];}

function transposeStep(step,alter,semitones,flats){
  if(!step)return'';

function chordText(h,semitones,flats){
  if(!h)return'';

function parseKeyLabel(text){

function buildSystem(measures,semitones,flats){
  const sys=document.createElement('div');sys.className='music-system';
  measures.forEach((measure,mi)=>{
    const block=document.createElement('div');block.className='measure-block';
    if(mi>0)block.appendChild(buildBarline(false));
    const sortedH=[...measure.harmonies].sort((a,b)=>a.divOff-b.divOff);
    let hIdx=0;
    for(const note of measure.notes){
      let activeChord=null;
      while(hIdx<sortedH.length&&sortedH[hIdx].divOff<=note.divOff+0.5){activeChord=sortedH[hIdx];hIdx++;}
      const mainNote=transposeStep(note.step,note.alter,semitones,flats);
      let noteStr=mainNote;
      if(note.extra&&note.extra.length>0)
        noteStr=mainNote+','+note.extra.map(e=>transposeStep(e.step,e.alter,semitones,flats)).join(',');
      block.appendChild(buildCell(noteStr,note.lyric?note.lyric.text:'',activeChord?chordText(activeChord,semitones,flats):''));
    }
    if(!measure.notes.length){
      while(hIdx<sortedH.length){block.appendChild(buildCell('','',chordText(sortedH[hIdx++],semitones,flats)));}
      if(!measure.harmonies.length)block.appendChild(buildCell('—','',''));
    }
    block.appendChild(buildBarline(mi===measures.length-1));
    sys.appendChild(block);
  });
  return sys;
}

let currentTranspose=0;
let mplValue=3;
let fontLevel=3;
let userKeyBase="G minor";
let userKeyBaseAt=0;

function applyFontLevel(){const f=FONT_SIZES[fontLevel-1];const r=document.documentElement;r.style.setProperty('--fs-note',f.note+'px');r.style.setProperty('--fs-lyric',f.lyric+'px');r.style.setProperty('--fs-chord',f.chord+'px');r.style.setProperty('--fs-bar',f.bar+'px');}
function updateTransposeUI(){const tv=document.getElementById('transpose-val');tv.textContent=currentTranspose===0?'0':(currentTranspose>0?'+'+currentTranspose:String(currentTranspose));}
function renderMusic(flats){const c=document.getElementById('music-content');c.innerHTML='';for(let i=0;i<songData.measures.length;i+=mplValue){c.appendChild(buildSystem(songData.measures.slice(i,i+mplValue),currentTranspose,flats));}}
function reRenderMusic(){updateTransposeUI();const delta=currentTranspose-userKeyBaseAt;document.getElementById('sheet-key-display').textContent=shiftKeyLabel(userKeyBase,delta);renderMusic(useFlats(currentTranspose,songData.key.fifths));}
function doTranspose(d){currentTranspose=Math.max(-12,Math.min(12,currentTranspose+d));reRenderMusic();}

document.getElementById('btn-dn1').addEventListener('click',()=>doTranspose(-1));
document.getElementById('btn-up1').addEventListener('click',()=>doTranspose(+1));
document.getElementById('btn-reset').addEventListener('click',()=>{currentTranspose=0;reRenderMusic();});
document.getElementById('btn-sm').addEventListener('click',()=>{if(fontLevel>1){fontLevel--;applyFontLevel();}});
document.getElementById('btn-lg').addEventListener('click',()=>{if(fontLevel<5){fontLevel++;applyFontLevel();}});
const ms=document.getElementById('mpl-slider');ms.addEventListener('input',()=>{mplValue=parseInt(ms.value);document.getElementById('mpl-val').textContent=mplValue;reRenderMusic();});

// ════ PRINT & PDF LOGIC ════
document.getElementById('btn-print').addEventListener('click',()=>window.print());

document.getElementById('btn-pdf').addEventListener('click',()=>{
  const sheet=document.getElementById('the-sheet');
  const title=document.getElementById('sheet-title-display').textContent.trim()||'chord-sheet';
  const fn=title.replace(/[^a-z0-9\s_-]/gi,'').trim().replace(/\s+/g,'-')+'.pdf';
  
  const opt = {
    margin: [10, 10, 10, 10], // Top, Left, Bottom, Right
    filename: fn,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { 
      scale: 2, 
      useCORS: true,
      scrollY: 0 // CRITICAL: Fixes "big empty space" at top
    },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };

  html2pdf().set(opt).from(sheet).save();
});
