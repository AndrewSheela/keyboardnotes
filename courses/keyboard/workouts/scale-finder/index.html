<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ear Training - Find The Scale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;700&display=swap');

        :root {
            --bg-dark: #0a0a0c;
            --orange-glow: #ff8c00;
            --lcd-blue: #4ed9ff;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #ccc;
            overflow: hidden;
            user-select: none;
        }

        .device-frame {
            background: radial-gradient(circle at center, #2a2a2a 0%, #1a1a1a 100%);
            border: 4px solid #111;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 2px 2px rgba(255,255,255,0.1);
            width: 100%;
            max-width: 650px;
            position: relative;
        }

        .lcd-screen {
            background: #101820;
            border: 2px solid #000;
            border-radius: 4px;
            padding: 15px;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,1);
            margin-bottom: 20px;
        }

        .lcd-text {
            font-family: 'Orbitron', sans-serif;
            color: var(--lcd-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(78, 217, 255, 0.6);
        }

        .waveform-container {
            width: 100%;
            height: 40px;
            background: rgba(0,0,0,0.3);
            margin-top: 10px;
            position: relative;
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
        }

        .wave-bar {
            position: absolute;
            bottom: 0;
            width: 2px;
            background: var(--lcd-blue);
            opacity: 0.3;
        }

        #playhead {
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: var(--orange-glow);
            box-shadow: 0 0 8px var(--orange-glow);
            z-index: 10;
        }

        .piano-container {
            background: #181818;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
        }

        /* KEY STYLING */
        .key {
            width: 42px; height: 120px;
            background: #eee; border: 1px solid #999;
            margin: 0 1px; border-radius: 0 0 4px 4px;
            cursor: pointer; transition: 0.1s;
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 10px; color: #888; font-size: 10px;
            user-select: none;
            touch-action: none;
            position: relative;
            z-index: 1; /* Standard White Keys */
        }

        .key.black {
            width: 28px; height: 75px;
            background: #222; margin-left: -15px; margin-right: -15px;
            z-index: 10; /* Black Keys always stay on top of White Keys */
            border-color: #000; color: #444;
        }

        /* Highlight for the currently selected answer */
        .key.selected { 
            background: var(--orange-glow) !important; 
            color: #fff; 
            box-shadow: 0 0 15px var(--orange-glow);
        }

        /* If a Black key is selected, it should still be above white keys */
        .key.black.selected {
            z-index: 11;
        }

        /* Temporary visual feedback while holding the key down */
        .key.pressing {
            filter: brightness(1.3);
            transform: translateY(2px);
        }

        .btn-recessed {
            background: #222;
            border: 1px solid #111;
            border-radius: 50px;
            padding: 8px 16px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            color: #666;
            transition: all 0.2s;
            font-family: 'Orbitron';
        }

        .btn-recessed.active {
            color: var(--orange-glow);
            text-shadow: 0 0 8px var(--orange-glow);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
        }

        input[type=range] {
            accent-color: var(--orange-glow);
            height: 4px;
            cursor: pointer;
        }

        #notification {
            position: fixed;
            top: 40px; left: 50%; transform: translateX(-50%);
            padding: 12px 30px; border-radius: 50px;
            font-weight: bold; font-family: 'Orbitron';
            opacity: 0; transition: 0.3s; z-index: 1000;
        }

        .error { background: #800; color: #ff9999; opacity: 1 !important; }
        .success { background: #080; color: #99ff99; opacity: 1 !important; }
        
        #init-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="init-overlay">
        <button class="px-12 py-4 bg-orange-600 text-white font-bold rounded-full tracking-widest shadow-lg hover:bg-orange-500 transition" onclick="startApp()">INITIALIZE SYSTEM</button>
    </div>

    <div id="notification"></div>

    <div class="device-frame">
        <div class="flex justify-between items-center mb-4">
            <div class="flex flex-col">
                <span style="color:var(--orange-glow); font-family:'Orbitron'; font-weight:bold; font-size:16px;">CLOUD SEEKER</span>
                <span id="track-counter" class="text-[10px] font-mono opacity-40">TRACK 0/0</span>
            </div>
            
            <div class="flex gap-4 items-center">
                <div class="flex flex-col items-end">
                    <span class="text-[9px] uppercase font-bold opacity-50">Piano Vol</span>
                    <input type="range" id="piano-vol" min="0" max="1" step="0.1" value="0.8" class="w-20">
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-[9px] uppercase font-bold opacity-50">Song Vol</span>
                    <input type="range" id="song-vol" min="0" max="1" step="0.1" value="0.5" class="w-20" oninput="updateSongVolume(this.value)">
                </div>
            </div>
        </div>

        <div class="lcd-screen">
            <div id="lcd-title" class="lcd-text text-[10px] mb-1 opacity-50">STANDBY</div>
            <div id="lcd-status" class="lcd-text text-lg">SYSTEM READY</div>
            
            <div class="waveform-container" id="wave-container" onclick="seekAudio(event)">
                <div id="playhead"></div>
            </div>
        </div>

        <div class="flex justify-center items-center mb-6">
            <button class="w-16 h-16 bg-zinc-900 border-2 border-zinc-700 rounded-full flex justify-center items-center text-orange-500 hover:scale-105 transition" onclick="togglePlay()">
                <div id="play-btn-inner">
                    <svg width="32" height="32" fill="currentColor" viewBox="0 0 16 16"><path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/></svg>
                </div>
            </button>
        </div>

        <div class="piano-container" id="piano"></div>

        <div class="flex justify-center gap-6 mb-8">
            <button id="btn-Major" class="btn-recessed" onclick="setMode('Major')">MAJOR</button>
            <button id="btn-Minor" class="btn-recessed" onclick="setMode('Minor')">MINOR</button>
        </div>

        <div class="flex justify-center">
            <button class="px-10 py-3 bg-zinc-800 border-2 border-zinc-600 rounded-full font-bold tracking-[0.2em] text-zinc-400 hover:text-white hover:border-orange-500 transition" onclick="validateSelection()">SUBMIT ANSWER</button>
        </div>
    </div>

    <script>
        const playlist = [
            "engal-Vaazhnaalellaam. C Major.mp3",
            "unnatha-devanae. F Major.mp3",
            "povas. D Minor.mp3",
            "aathumavae. E Minor.mp3"
        ];

        const USE_CUSTOM_SAMPLES = true; 

        let currentTrackIndex = 0;
        let audio = new Audio();
        audio.loop = true;
        
        let selectedKey = null;
        let selectedScale = null;
        let correctAnswer = { key: null, scale: null };
        let audioCtx = null;
        let isAppStarted = false;

        const activeSamples = {}; 
        const activeOscillators = {}; 

        function startApp() {
            if (isAppStarted) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('init-overlay').style.display = 'none';
            isAppStarted = true;
            generateWaveform();
            loadTrack(0);
        }

        const piano = document.getElementById('piano');
        const notes = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
        const noteFreqs = { 'C': 261.63, 'Db': 277.18, 'D': 293.66, 'Eb': 311.13, 'E': 329.63, 'F': 349.23, 'Gb': 369.99, 'G': 392.00, 'Ab': 415.30, 'A': 440.00, 'Bb': 466.16, 'B': 493.88 };

        notes.forEach(note => {
            const isBlack = note.includes('b');
            const keyEl = document.createElement('div');
            keyEl.className = `key ${isBlack ? 'black' : ''}`;
            keyEl.dataset.note = note;
            keyEl.innerText = note;
            
            keyEl.onmousedown = (e) => { e.preventDefault(); handleKeyPress(note, keyEl); };
            keyEl.onmouseup = () => handleKeyRelease(note, keyEl);
            keyEl.onmouseleave = () => handleKeyRelease(note, keyEl);
            keyEl.ontouchstart = (e) => { e.preventDefault(); handleKeyPress(note, keyEl); };
            keyEl.ontouchend = () => handleKeyRelease(note, keyEl);

            piano.appendChild(keyEl);
        });

        function handleKeyPress(note, el) {
            selectedKey = note;
            
            document.querySelectorAll('.key').forEach(k => k.classList.remove('selected'));
            el.classList.add('selected');
            el.classList.add('pressing');

            startPianoSound(note);
        }

        function handleKeyRelease(note, el) {
            el.classList.remove('pressing');
            stopPianoSound(note);
        }

        function loadTrack(index) {
            if (index >= playlist.length) {
                showStatus("FINISHED", "CHALLENGE COMPLETE");
                audio.pause();
                updatePlayButtonIcon(false);
                return;
            }

            const fileName = playlist[index];
            const regex = /([A-G][b#]?)\s+(Major|Minor)/i;
            const match = fileName.match(regex);

            if (match) {
                correctAnswer.key = normalizeKey(match[1]);
                correctAnswer.scale = match[2].charAt(0).toUpperCase() + match[2].slice(1).toLowerCase();
                
                const displayName = fileName.split('.')[0].replace(/-/g, ' ');
                showStatus(displayName, "READY");
                audio.src = `songs/${fileName}`;
                audio.volume = document.getElementById('song-vol').value;
                audio.load();
                
                resetSelections();
                document.getElementById('track-counter').innerText = `TRACK ${index + 1}/${playlist.length}`;
            }
        }

        function updatePlayButtonIcon(isPlaying) {
             const inner = document.getElementById('play-btn-inner');
             if (isPlaying) {
                 inner.innerHTML = '<svg width="32" height="32" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5zm5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5z"/></svg>';
             } else {
                 inner.innerHTML = '<svg width="32" height="32" fill="currentColor" viewBox="0 0 16 16"><path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/></svg>';
             }
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                updatePlayButtonIcon(true);
            } else {
                audio.pause();
                updatePlayButtonIcon(false);
            }
        }

        audio.ontimeupdate = () => {
            const playhead = document.getElementById('playhead');
            const percent = (audio.currentTime / audio.duration) * 100;
            playhead.style.left = `${percent}%`;
        };

        function seekAudio(e) {
            const container = document.getElementById('wave-container');
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percent = x / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function generateWaveform() {
            const container = document.getElementById('wave-container');
            for (let i = 0; i < 150; i++) {
                const bar = document.createElement('div');
                bar.className = 'wave-bar';
                bar.style.left = `${(i / 150) * 100}%`;
                bar.style.height = `${Math.random() * 80 + 20}%`;
                container.appendChild(bar);
            }
        }

        function updateSongVolume(val) {
            audio.volume = val;
        }

        function startPianoSound(note) {
            if (!audioCtx) return;
            const pianoVol = parseFloat(document.getElementById('piano-vol').value);

            if (USE_CUSTOM_SAMPLES) {
                if (activeSamples[note]) {
                    activeSamples[note].pause();
                    activeSamples[note].currentTime = 0;
                }
                const sample = new Audio(`piano_samples/${note}.mp3`);
                sample.volume = pianoVol;
                activeSamples[note] = sample;
                sample.play().catch(e => startSynth(note, pianoVol));
            } else {
                startSynth(note, pianoVol);
            }
        }

        function stopPianoSound(note) {
            if (activeSamples[note]) {
                const s = activeSamples[note];
                const fadeInterval = setInterval(() => {
                    if (s.volume > 0.1) {
                        s.volume -= 0.1;
                    } else {
                        s.pause();
                        s.currentTime = 0;
                        clearInterval(fadeInterval);
                    }
                }, 10);
            }

            if (activeOscillators[note]) {
                const { osc, gain } = activeOscillators[note];
                const now = audioCtx.currentTime;
                gain.gain.cancelScheduledValues(now);
                gain.gain.setValueAtTime(gain.gain.value, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
                osc.stop(now + 0.06);
                delete activeOscillators[note];
            }
        }

        function startSynth(note, vol) {
            if (activeOscillators[note]) return; 
            const freq = noteFreqs[note];
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(vol * 0.8, audioCtx.currentTime + 0.01);
            osc.connect(g).connect(audioCtx.destination);
            osc.start();
            activeOscillators[note] = { osc, gain: g };
        }

        function setMode(mode) {
            selectedScale = mode;
            document.getElementById('btn-Major').classList.remove('active');
            document.getElementById('btn-Minor').classList.remove('active');
            document.getElementById(`btn-${mode}`).classList.add('active');
        }

        function validateSelection() {
            if (!selectedKey || !selectedScale) {
                showToast("SELECT KEY & SCALE", "error");
                return;
            }

            if (selectedKey === correctAnswer.key && selectedScale === correctAnswer.scale) {
                showToast("CORRECT!", "success");
                
                // Stop current audio before switching
                audio.pause();
                
                setTimeout(() => {
                    currentTrackIndex++;
                    loadTrack(currentTrackIndex);
                    
                    // Automatically play the new track if it's not the end
                    if (currentTrackIndex < playlist.length) {
                        audio.play().then(() => {
                            updatePlayButtonIcon(true);
                        }).catch(e => {
                            updatePlayButtonIcon(false);
                        });
                    }
                }, 1000);
            } else {
                showToast("INCORRECT. TRY AGAIN.", "error");
            }
        }

        function normalizeKey(key) {
            const sharps = { 'C#': 'Db', 'D#': 'Eb', 'F#': 'Gb', 'G#': 'Ab', 'A#': 'Bb' };
            return sharps[key] || key;
        }

        function resetSelections() {
            selectedKey = null;
            selectedScale = null;
            document.querySelectorAll('.key').forEach(k => k.classList.remove('selected', 'pressing'));
            document.getElementById('btn-Major').classList.remove('active');
            document.getElementById('btn-Minor').classList.remove('active');
        }

        function showToast(msg, type) {
            const n = document.getElementById('notification');
            n.innerText = msg;
            n.className = type;
            setTimeout(() => n.className = '', 2000);
        }

        function showStatus(title, status) {
            document.getElementById('lcd-title').innerText = title;
            document.getElementById('lcd-status').innerText = status;
        }
    </script>
</body>
</html>
