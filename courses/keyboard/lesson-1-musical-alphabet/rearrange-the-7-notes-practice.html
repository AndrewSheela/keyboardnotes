<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rearrange the Musical Alphabet in Right Order</title>
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for the draggable notes */
        .note-tile {
            cursor: grab;
            /* Enhanced transition for a snappier, more "enthusiastic" feel */
            transition: transform 0.2s ease-out, box-shadow 0.2s ease-in-out; 
            user-select: none;
            flex-shrink: 0; 
            /* Fixed width for desktop */
            width: 80px; 
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            border: 3px solid rgba(0,0,0,0.1);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05); /* Baseline subtle shadow */
        }

        .note-tile:hover {
            /* Stronger hover effect: stronger shadow and slight lift */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2); 
            transform: translateY(-2px); /* Slight lift */
        }

        .note-tile.dragging {
            opacity: 0.7;
            /* Pronounced lift and scale change when actively dragging */
            transform: scale(1.08) translateY(-4px); 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); /* Very strong shadow */
            z-index: 10;
        }

        .note-container {
            min-height: 100px;
            display: flex;
            flex-wrap: wrap; /* Allows wrapping on smaller screens */
            gap: 8px; /* Default desktop gap */
            padding: 1rem;
            background-color: #f3f4f6;
            border-radius: 0.75rem;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
        }

        /* Color definitions for notes to make them visually distinct */
        /* Retaining the colors from the reference code for visual consistency */
        .note-C { background-color: #fecaca; color: #dc2626; }
        .note-D { background-color: #fde68a; color: #ca8a04; }
        .note-E { background-color: #a7f3d0; color: #059669; }
        .note-F { background-color: #bfdbfe; color: #2563eb; }
        .note-G { background-color: #f0e6ff; color: #7c3aed; }
        .note-A { background-color: #fce7f3; color: #be185d; }
        .note-B { background-color: #fee2e2; color: #ef4444; }

        /* Style for the button */
        #check-button {
            transition: background-color 0.15s ease-in-out, transform 0.1s;
        }
        #check-button:active {
            transform: scale(0.98);
        }

        /* Responsive adjustments for 7 notes on mobile (<= 640px) */
        @media (max-width: 640px) {
            .note-container {
                gap: 4px; /* Smaller gap on mobile */
                padding: 0.5rem;
                justify-content: center; /* Center the rows of notes */
            }
            .note-tile {
                /* Calculate width to fit 4 tiles per row, then 3 (7 total notes) */
                width: calc(24% - 3px); 
                height: 55px; /* Increase height for better touch target */
                font-size: 1rem;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white p-6 md:p-10 rounded-xl shadow-2xl">
        <h1 class="text-3xl font-extrabold text-indigo-700 mb-2 border-b-2 pb-2">
            Rearrange the Musical Alphabet in Right Order
        </h1>
        <p class="text-gray-600 mb-6">
            Drag the 7 natural notes below and arrange them in their correct ascending cyclical order.
        </p>

        <!-- Exercise Info: Now using a 3-column grid -->
        <div class="grid grid-cols-3 items-center mb-6 p-4 bg-indigo-50 rounded-lg shadow-inner">
            <div class="text-xl font-semibold text-left">
                Question: <span id="exercise-counter" class="text-indigo-800">1 / 20</span>
            </div>
            <div class="text-xl font-semibold text-center">
                Starting Note: <span id="current-root" class="text-indigo-800 font-extrabold">C</span>
            </div>
            <!-- Empty column for horizontal balance -->
            <div></div>
        </div>

        <!-- Draggable Note Container -->
        <div id="note-container" class="note-container mb-6">
            <!-- Note tiles will be inserted here by JavaScript -->
        </div>

        <!-- Controls and Feedback -->
        <div class="flex flex-col md:flex-row justify-center items-center gap-4">
            <button id="check-button"
                class="w-full md:w-auto px-8 py-3 bg-indigo-600 text-white text-lg font-bold rounded-xl hover:bg-indigo-700 shadow-lg transition-colors focus:outline-none focus:ring-4 focus:ring-indigo-500 focus:ring-opacity-50">
                Check Answer
            </button>
            <div id="feedback" class="text-xl font-semibold h-8 flex items-center">
                <!-- Feedback messages appear here -->
            </div>
        </div>
    </div>

    <script>
        // --- Canvas-Specific Setup (Required for all apps) ---
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const apiKey = ""; 
        // --- End Firebase Setup ---

        // The 7 natural notes of the musical alphabet
        const MUSICAL_ALPHABET = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
        const EXERCISE_COUNT = 20; // User requested 20 questions
        
        let exercises = [];
        let currentExerciseIndex = 0;
        let isDragging = false;
        let draggedElement = null;

        const noteContainer = document.getElementById('note-container');
        const checkButton = document.getElementById('check-button');
        const feedbackElement = document.getElementById('feedback');
        const exerciseCounterElement = document.getElementById('exercise-counter');
        const currentRootElement = document.getElementById('current-root');

        // Utility to shuffle an array (Fisher-Yates)
        const shuffleArray = (array) => {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        };

        // Utility to generate the correct cyclical sequence starting from a root note
        const generateCyclicSequence = (rootNote) => {
            const startIndex = MUSICAL_ALPHABET.indexOf(rootNote);
            if (startIndex === -1) return [];

            const sequence = [];
            for (let i = 0; i < MUSICAL_ALPHABET.length; i++) {
                // Use modulo arithmetic to loop back (e.g., index 7 becomes index 0)
                sequence.push(MUSICAL_ALPHABET[(startIndex + i) % MUSICAL_ALPHABET.length]);
            }
            return sequence;
        };

        const createNoteElement = (note) => {
            const tile = document.createElement('div');
            
            // Define a color map using the single letter of the note
            const colorMap = {
                'C': 'note-C', 'D': 'note-D', 'E': 'note-E', 'F': 'note-F', 
                'G': 'note-G', 'A': 'note-A', 'B': 'note-B',
            };
            
            const noteClass = colorMap[note] || 'note-C'; 
            
            tile.className = `note-tile rounded-lg shadow-md ${noteClass}`;
            tile.textContent = note;
            tile.setAttribute('draggable', true);
            tile.dataset.note = note;
            return tile;
        };

        const initExercises = () => {
            exercises = [];
            // Generate 20 random exercises
            for (let i = 0; i < EXERCISE_COUNT; i++) {
                // Randomly select a starting note
                const randomIndex = Math.floor(Math.random() * MUSICAL_ALPHABET.length);
                const rootNote = MUSICAL_ALPHABET[randomIndex];

                // Determine the correct sequence
                const correctSequence = generateCyclicSequence(rootNote);

                exercises.push({
                    root: rootNote,
                    correctNotes: correctSequence
                });
            }
            // No need to shuffle exercises here, as the generation already produces a random sequence of roots.
        };

        const loadExercise = (index) => {
            if (index >= EXERCISE_COUNT) {
                showFinalScore();
                return;
            }

            const currentExercise = exercises[index];
            const correctNotes = currentExercise.correctNotes;
            
            // 1. Shuffle a copy of the correct notes for the display order
            const jumbledNotes = shuffleArray([...correctNotes]); 

            // 2. Update UI text
            exerciseCounterElement.textContent = `${index + 1} / ${EXERCISE_COUNT}`;
            currentRootElement.textContent = currentExercise.root;
            feedbackElement.textContent = '';
            checkButton.disabled = false;
            checkButton.textContent = 'Check Answer';
            checkButton.classList.remove('bg-green-600', 'bg-red-600', 'cursor-not-allowed');
            checkButton.classList.add('bg-indigo-600');

            // 3. Clear and repopulate container
            noteContainer.innerHTML = '';
            jumbledNotes.forEach(note => {
                const tile = createNoteElement(note);
                noteContainer.appendChild(tile);
            });
        };

        const checkSolution = () => {
            const currentExercise = exercises[currentExerciseIndex];
            // Get the order the user placed the tiles in
            const currentOrder = Array.from(noteContainer.children).map(tile => tile.dataset.note);
            const correctOrder = currentExercise.correctNotes;

            // Check if every note in the user's order matches the correct order at the same index
            const isCorrect = currentOrder.every((note, i) => note === correctOrder[i]);

            checkButton.disabled = true;

            if (isCorrect) {
                feedbackElement.className = 'text-xl font-semibold text-green-600';
                feedbackElement.textContent = '✅ Correct! Moving to the next question...';
                checkButton.classList.remove('bg-indigo-600', 'bg-red-600');
                checkButton.classList.add('bg-green-600', 'cursor-not-allowed');
                checkButton.textContent = 'Correct!';

                // Wait a moment then load next
                setTimeout(nextExercise, 1500);
            } else {
                feedbackElement.className = 'text-xl font-semibold text-red-600';
                feedbackElement.textContent = '❌ Incorrect. Keep trying!';
                checkButton.classList.remove('bg-indigo-600', 'bg-green-600', 'cursor-not-allowed');
                checkButton.classList.add('bg-red-600');
                checkButton.textContent = 'Try Again';
                checkButton.disabled = false; // Allow re-attempt
            }
        };

        const nextExercise = () => {
            currentExerciseIndex++;
            loadExercise(currentExerciseIndex);
        };

        const showFinalScore = () => {
            feedbackElement.className = 'text-2xl font-bold text-indigo-700';
            feedbackElement.textContent = `Challenge Complete! You finished all ${EXERCISE_COUNT} questions.`;
            currentRootElement.textContent = '---';
            noteContainer.innerHTML = '<p class="text-gray-500 p-4">Great work! You mastered the musical alphabet. Refresh the page to start a new quiz!</p>';
            checkButton.textContent = 'Finished';
            checkButton.disabled = true;
        };

        // --- Drag and Drop Handlers (Kept from reference code) ---

        const dragStart = (e) => {
            draggedElement = e.target;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedElement.dataset.note);
            setTimeout(() => {
                draggedElement.classList.add('dragging');
            }, 0);
            isDragging = true;
        };

        const dragOver = (e) => {
            e.preventDefault();
            
            // Check if the drop target is a note tile and not the element being dragged
            if (!e.target.classList.contains('note-tile') || e.target === draggedElement) {
                // If dragging over the container background, the element will be inserted at the end of the container
                if (e.target === noteContainer && draggedElement) {
                    noteContainer.appendChild(draggedElement);
                }
                return;
            }

            const container = noteContainer;
            const targetElement = e.target;
            
            // Determine the insertion point
            const targetRect = targetElement.getBoundingClientRect();
            const midpoint = targetRect.left + (targetRect.width / 2);
            
            if (e.clientX < midpoint) {
                // Dragging to the left of the target element
                container.insertBefore(draggedElement, targetElement);
            } else {
                // Dragging to the right of the target element
                container.insertBefore(draggedElement, targetElement.nextSibling);
            }
        };

        const dragEnd = () => {
            if (draggedElement) {
                draggedElement.classList.remove('dragging');
                draggedElement = null;
            }
            isDragging = false;
        };

        // --- Initialization ---

        document.addEventListener('DOMContentLoaded', () => {
            initExercises();
            loadExercise(currentExerciseIndex);

            checkButton.addEventListener('click', checkSolution);

            // Add drag listeners to the container (delegation)
            noteContainer.addEventListener('dragstart', dragStart);
            noteContainer.addEventListener('dragover', dragOver);
            noteContainer.addEventListener('dragend', dragEnd);
            noteContainer.addEventListener('dragleave', (e) => e.preventDefault());
            noteContainer.addEventListener('drop', (e) => e.preventDefault());

            // --- Touch Handlers for Mobile Dragging ---
            let touchStartX, touchStartY;
            let currentTouchTile = null;

            const getTouchTarget = (touch) => {
                return document.elementFromPoint(touch.clientX, touch.clientY);
            };

            const touchStart = (e) => {
                if (e.target.classList.contains('note-tile')) {
                    e.preventDefault(); // Prevent scrolling
                    currentTouchTile = e.target;
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    currentTouchTile.classList.add('dragging');

                    // Create a pseudo-dragged element for better visibility (optional but good UX)
                    const clone = currentTouchTile.cloneNode(true);
                    clone.id = 'touch-clone';
                    clone.style.position = 'fixed';
                    clone.style.pointerEvents = 'none';
                    clone.style.transform = `translate(-50%, -50%) scale(1.08)`;
                    clone.style.left = `${e.touches[0].clientX}px`;
                    clone.style.top = `${e.touches[0].clientY}px`;
                    clone.style.zIndex = '1000';
                    document.body.appendChild(clone);
                }
            };

            const touchMove = (e) => {
                if (!currentTouchTile) return;
                e.preventDefault();

                const touch = e.touches[0];
                const clone = document.getElementById('touch-clone');
                if (clone) {
                    clone.style.left = `${touch.clientX}px`;
                    clone.style.top = `${touch.clientY}px`;
                }

                // Find the element currently being dragged over
                const target = getTouchTarget(touch);
                
                // Use dragOver logic for reordering
                if (target && target.classList.contains('note-tile') && target !== currentTouchTile) {
                    const container = noteContainer;
                    const targetRect = target.getBoundingClientRect();
                    const midpoint = targetRect.left + (targetRect.width / 2);

                    // Reorder the original tile relative to the target tile
                    if (touch.clientX < midpoint) {
                        container.insertBefore(currentTouchTile, target);
                    } else {
                        container.insertBefore(currentTouchTile, target.nextSibling);
                    }
                } else if (target === noteContainer) {
                    // Drop into the container background (at the end)
                    noteContainer.appendChild(currentTouchTile);
                }
            };

            const touchEnd = () => {
                if (currentTouchTile) {
                    currentTouchTile.classList.remove('dragging');
                    currentTouchTile = null;

                    const clone = document.getElementById('touch-clone');
                    if (clone) {
                        clone.remove();
                    }
                }
            };

            // Attach touch listeners to the container
            noteContainer.addEventListener('touchstart', touchStart);
            noteContainer.addEventListener('touchmove', touchMove);
            noteContainer.addEventListener('touchend', touchEnd);
            noteContainer.addEventListener('touchcancel', touchEnd);
        });
    </script>
</body>
</html>
