<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minor Chord Construction</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Load Tone.js for sound generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        /* Custom styles for the 16:9 aspect ratio container */
        .video-quiz-container {
            width: 95%;
            max-width: 1000px; 
            margin: 0 auto;
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            background-color: #1e293b; /* Slate-800 */
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .quiz-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 2.5rem; 
        }

        @media (max-width: 768px) {
            .video-quiz-container {
                width: 100%;
                padding-bottom: 0; 
                height: auto;
                min-height: 100vh; 
                border-radius: 0;
            }
            .quiz-content {
                position: relative;
                padding: 1rem;
            }
        }

        .note-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            user-select: none;
        }
        
        .note-button.selected {
            background-color: #3b82f6 !important;
            color: white !important;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        
        .note-button.correct {
            background-color: #10b981 !important;
            color: white !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }
        
        .note-button.incorrect {
            background-color: #ef4444 !important;
            color: white !important;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .selection-slot {
            transition: all 0.3s ease;
            border: 2px dashed rgba(255,255,255,0.1);
        }
        
        .selection-slot.filled {
            border-style: solid;
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }

        .selection-slot.correct-slot {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .selection-slot.incorrect-slot {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        #hint-modal {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans flex items-center justify-center min-h-screen p-4">

    <div class="video-quiz-container">
        <div class="quiz-content">

            <header class="flex justify-between items-center mb-4">
                <div class="w-20"></div> <!-- Left spacer to center title -->
                <h1 class="text-xl md:text-2xl font-black tracking-tighter text-indigo-400 uppercase italic">Minor Chord Construction</h1>
                <button id="hint-btn" class="bg-slate-700/50 hover:bg-slate-700 text-slate-200 px-4 py-1.5 rounded-full text-sm font-bold border border-slate-600/50 transition-all flex items-center gap-2">
                    <i data-lucide="sparkles" class="w-3.5 h-3.5 text-indigo-400"></i>
                    Hint
                </button>
            </header>

            <!-- Audio Activation Overlay -->
            <div id="audio-overlay" class="absolute inset-0 z-50 flex items-center justify-center bg-slate-900/90 rounded-2xl">
                <button id="start-btn" class="group flex flex-col items-center space-y-4 hover:scale-105 transition-transform">
                    <div class="w-20 h-20 bg-indigo-600 rounded-full flex items-center justify-center shadow-2xl group-hover:bg-indigo-500">
                        <i data-lucide="volume-2" class="w-10 h-10 text-white"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight">Begin Exercise</span>
                </button>
            </div>

            <!-- Hint Modal -->
            <div id="hint-modal" class="hidden absolute inset-0 z-[60] flex items-center justify-center p-6">
                <div class="bg-slate-800 border border-slate-700 p-8 rounded-3xl shadow-2xl max-w-md w-full text-center">
                    <h3 class="text-indigo-400 font-black uppercase tracking-widest text-sm mb-2">Natural Minor Scale Reference</h3>
                    <h2 id="hint-scale-name" class="text-3xl font-bold mb-6">C Minor Scale</h2>
                    
                    <div id="hint-notes-list" class="flex flex-wrap justify-center gap-3 mb-8">
                        <!-- Notes list -->
                    </div>

                    <button id="close-hint-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-full font-bold transition-all flex items-center justify-center mx-auto gap-2">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i>
                        Back to Quiz
                    </button>
                </div>
            </div>

            <main class="flex-grow flex flex-col items-center justify-center text-center">
                <div id="quiz-ui" class="w-full max-w-2xl">
                    <h2 class="text-2xl md:text-3xl font-bold mb-6" id="chord-prompt">
                        Loading challenge...
                    </h2>

                    <div id="selected-notes-display" class="flex justify-center gap-4 mb-8">
                        <!-- Slots generated by JS -->
                    </div>

                    <div id="notes-grid" class="grid grid-cols-4 md:grid-cols-6 gap-2 px-4">
                        <!-- Buttons generated by JS -->
                    </div>

                    <div class="mt-6 min-h-[80px] flex flex-col items-center justify-center">
                        <p id="feedback" class="text-lg font-bold mb-3 h-6 transition-opacity duration-300 opacity-0"></p>
                        
                        <button id="submit-btn" disabled class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-30 disabled:grayscale text-white px-10 py-3 rounded-full font-bold shadow-xl transition-all active:scale-95 text-lg">
                            Verify
                        </button>
                        
                        <button id="try-again-btn" class="hidden bg-slate-700 hover:bg-slate-600 text-white px-10 py-3 rounded-full font-bold shadow-xl transition-all text-lg">
                            Try Again
                        </button>

                        <button id="continue-btn" class="hidden bg-emerald-500 hover:bg-emerald-400 text-white px-10 py-3 rounded-full font-bold shadow-xl transition-all text-lg">
                            Next Chord
                        </button>
                    </div>
                </div>

                <!-- Final Screen -->
                <div id="result-screen" class="hidden">
                    <div class="bg-slate-900 border border-slate-700 p-8 rounded-3xl shadow-2xl">
                        <i data-lucide="award" class="w-12 h-12 text-yellow-400 mx-auto mb-3"></i>
                        <h2 class="text-3xl font-black mb-2">Construction Complete!</h2>
                        <p class="text-slate-400 mb-6 max-w-sm mx-auto text-base">You have successfully constructed all 12 minor triads across the chromatic scale.</p>
                        <button onclick="location.reload()" class="bg-white text-black px-10 py-3 rounded-full font-bold hover:bg-slate-200 transition-colors text-lg">
                            Restart Series
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const CONFIG = {
            total: 12,
            notes: ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'],
            displayNames: ['C', 'C#/Db', 'D', 'D#/Eb', 'E', 'F', 'F#/Gb', 'G', 'G#/Ab', 'A', 'A#/Bb', 'B'],
            // UPDATED: Minor Formula (0, 3, 7) instead of Major (0, 4, 7)
            chordConfig: { formula: [0, 3, 7], labels: ['Root', 'Min 3rd', 'Perf 5th'], color: 'text-indigo-400' },
            // UPDATED: Natural Minor Scale steps (W-H-W-W-H-W-W)
            scaleFormula: [0, 2, 3, 5, 7, 8, 10] 
        };

        let state = {
            current: 1,
            shuffledRoots: [],
            targetIndices: [],
            selectedNotes: [],
            answered: false,
            correct: false,
            synth: null
        };

        const ui = {
            prompt: document.getElementById('chord-prompt'),
            display: document.getElementById('selected-notes-display'),
            grid: document.getElementById('notes-grid'),
            submit: document.getElementById('submit-btn'),
            tryAgain: document.getElementById('try-again-btn'),
            continue: document.getElementById('continue-btn'),
            feedback: document.getElementById('feedback'),
            overlay: document.getElementById('audio-overlay'),
            result: document.getElementById('result-screen'),
            quizUi: document.getElementById('quiz-ui'),
            hintBtn: document.getElementById('hint-btn'),
            hintModal: document.getElementById('hint-modal'),
            hintScaleName: document.getElementById('hint-scale-name'),
            hintNotesList: document.getElementById('hint-notes-list'),
            closeHintBtn: document.getElementById('close-hint-btn')
        };

        async function initAudio() {
            await Tone.start();
            state.synth = new Tone.PolySynth(Tone.Synth).toDestination();
            ui.overlay.classList.add('hidden');
            
            state.shuffledRoots = [...Array(12).keys()];
            for (let i = state.shuffledRoots.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [state.shuffledRoots[i], state.shuffledRoots[j]] = [state.shuffledRoots[j], state.shuffledRoots[i]];
            }
            
            startQuestion();
        }

        function playNote(noteName) {
            if (!state.synth) return;
            const clean = noteName.split('/')[0] + "4";
            state.synth.triggerAttackRelease(clean, "8n");
        }

        function playChord(indices) {
            const notes = indices.map(i => CONFIG.notes[i] + "4");
            state.synth.triggerAttackRelease(notes, "2n");
        }

        function startQuestion() {
            state.answered = false;
            state.correct = false;
            state.selectedNotes = [];
            
            const rootIdx = state.shuffledRoots[state.current - 1];
            state.targetIndices = CONFIG.chordConfig.formula.map(offset => (rootIdx + offset) % 12);

            ui.prompt.innerHTML = `Construct a <span class="${CONFIG.chordConfig.color}">${CONFIG.notes[rootIdx]} Minor</span> triad:`;
            
            resetUIState();
            renderSlots();
            renderKeyboard();
        }

        function resetUIState() {
            ui.submit.classList.remove('hidden');
            ui.submit.disabled = true;
            ui.continue.classList.add('hidden');
            ui.tryAgain.classList.add('hidden');
            ui.feedback.style.opacity = '0';
        }

        function renderSlots() {
            ui.display.innerHTML = '';
            CONFIG.chordConfig.labels.forEach((label, i) => {
                const noteName = state.selectedNotes[i];
                const slot = document.createElement('div');
                let slotClass = `selection-slot flex flex-col items-center justify-center w-20 h-20 md:w-24 md:h-24 rounded-2xl transition-all`;
                
                if (noteName) {
                    slotClass += ' filled';
                    if (state.answered) {
                        slotClass += state.correct ? ' correct-slot' : ' incorrect-slot';
                    }
                }

                slot.className = slotClass;
                slot.innerHTML = `
                    <span class="text-[10px] uppercase opacity-50 font-black mb-1 tracking-widest">${label}</span>
                    <span class="text-xl md:text-2xl font-black">${noteName || '?'}</span>
                `;
                ui.display.appendChild(slot);
            });
        }

        function renderKeyboard() {
            ui.grid.innerHTML = '';
            CONFIG.displayNames.forEach((name, i) => {
                const btn = document.createElement('button');
                const isAccidental = name.includes('/');
                btn.className = `note-button p-3 md:p-4 rounded-xl font-black text-sm md:text-base ${
                    isAccidental ? 'bg-slate-900 text-slate-500' : 'bg-slate-700 text-white'
                }`;
                btn.textContent = name;
                btn.onclick = () => handleSelect(name, i, btn);
                ui.grid.appendChild(btn);
            });
        }

        function handleSelect(name, index, btn) {
            if (state.answered) return;

            const existingIdx = state.selectedNotes.indexOf(name);
            if (existingIdx !== -1) {
                state.selectedNotes.splice(existingIdx, 1);
                btn.classList.remove('selected');
            } else if (state.selectedNotes.length < 3) {
                state.selectedNotes.push(name);
                btn.classList.add('selected');
                playNote(name);
            }

            ui.submit.disabled = state.selectedNotes.length !== 3;
            renderSlots();
        }

        function checkAnswer() {
            const selectedIndices = state.selectedNotes.map(name => {
                const base = name.split('/')[0];
                return CONFIG.notes.indexOf(base);
            });

            const isCorrect = state.targetIndices.every((val, i) => val === selectedIndices[i]);

            state.answered = true;
            state.correct = isCorrect;
            ui.submit.classList.add('hidden');
            ui.feedback.style.opacity = '1';

            const buttons = ui.grid.querySelectorAll('button');

            if (isCorrect) {
                ui.feedback.textContent = "Minor Triad Correct ✓";
                ui.feedback.className = "text-lg font-black mb-3 text-emerald-400";
                ui.continue.classList.remove('hidden');
                playChord(state.targetIndices);
                
                buttons.forEach(btn => {
                    const name = btn.textContent;
                    if (state.selectedNotes.includes(name)) {
                        btn.classList.remove('selected');
                        btn.classList.add('correct');
                    }
                });
            } else {
                ui.feedback.textContent = "Incorrect minor pattern. Try again!";
                ui.feedback.className = "text-lg font-black mb-3 text-red-400";
                ui.tryAgain.classList.remove('hidden');

                buttons.forEach(btn => {
                    const name = btn.textContent;
                    const base = name.split('/')[0];
                    const idx = CONFIG.notes.indexOf(base);
                    btn.classList.remove('selected');
                    if (state.selectedNotes.includes(name) && !state.targetIndices.includes(idx)) {
                        btn.classList.add('incorrect');
                    }
                });
            }
            renderSlots();
        }

        function showHint() {
            const rootIdx = state.shuffledRoots[state.current - 1];
            const rootName = CONFIG.notes[rootIdx];
            ui.hintScaleName.textContent = `${rootName} Minor Scale`;
            ui.hintNotesList.innerHTML = '';
            
            CONFIG.scaleFormula.forEach(step => {
                const noteIdx = (rootIdx + step) % 12;
                const noteName = CONFIG.displayNames[noteIdx];
                const noteEl = document.createElement('div');
                noteEl.className = "bg-slate-700 px-4 py-2 rounded-xl font-bold border border-slate-600 shadow-lg text-indigo-300";
                noteEl.textContent = noteName;
                ui.hintNotesList.appendChild(noteEl);
            });

            ui.hintModal.classList.remove('hidden');
        }

        function hideHint() {
            ui.hintModal.classList.add('hidden');
        }

        function tryAgain() {
            state.answered = false;
            state.correct = false;
            state.selectedNotes = [];
            resetUIState();
            renderSlots();
            renderKeyboard();
        }

        function next() {
            if (state.current < CONFIG.total) {
                state.current++;
                startQuestion();
            } else {
                ui.quizUi.classList.add('hidden');
                ui.result.classList.remove('hidden');
            }
        }

        document.getElementById('start-btn').onclick = initAudio;
        ui.submit.onclick = checkAnswer;
        ui.continue.onclick = next;
        ui.tryAgain.onclick = tryAgain;
        ui.hintBtn.onclick = showHint;
        ui.closeHintBtn.onclick = hideHint;
        lucide.createIcons();
    </script>
</body>
</html>
