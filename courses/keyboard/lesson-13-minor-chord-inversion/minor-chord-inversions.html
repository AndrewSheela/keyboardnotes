<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Inversion Quiz - Minor Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a; /* Deep Navy */
        }
        .app-container {
            width: 1280px;
            height: 720px;
            overflow: hidden;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        .note-box {
            transition: all 0.2s ease-in-out;
        }
        .note-box:hover {
            transform: scale(1.05);
            border-color: #38bdf8;
        }
        .correct {
            background-color: #059669 !important;
            color: white !important;
            border-color: #10b981 !important;
        }
        .incorrect {
            background-color: #991b1b !important;
            color: white !important;
            border-color: #ef4444 !important;
            animation: shake 0.4s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #334155;
            transition: all 0.3s;
        }
        .progress-dot.completed {
            background-color: #38bdf8;
            box-shadow: 0 0 10px #38bdf8;
        }
    </style>
</head>
<body class="flex items-center justify-center m-0">

    <div class="app-container relative flex flex-col items-center p-4 border border-slate-800 shadow-2xl">
        
        <!-- Header Section -->
        <header class="w-full max-w-2xl text-center mb-4 mt-2">
            <div class="flex justify-between items-center mb-2">
                <span id="quiz-progress" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Question 1 / 12</span>
                <span id="score-display" class="text-xs font-bold text-sky-400 uppercase tracking-widest">Score: 0</span>
            </div>
            <h1 class="text-3xl font-black text-white mb-2 tracking-tight uppercase">Minor Inversions</h1>
            <div id="progress-dots" class="flex justify-center gap-2">
                <!-- Dots generated by JS -->
            </div>
        </header>

        <div class="w-full max-w-3xl space-y-4">
            <!-- Quiz Card -->
            <div class="bg-slate-800/50 py-3 px-10 rounded-2xl text-center border border-slate-700 backdrop-blur-sm">
                <h2 class="text-3xl font-black text-white leading-none">
                    <span id="display-chord-name">C Minor</span>
                    <span id="display-root-notes" class="text-slate-400 font-medium ml-4 text-2xl">
                        (Root: C Eb G)
                    </span>
                </h2>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <!-- 1st Inversion Section -->
                <section class="bg-slate-900/40 p-4 rounded-xl border border-slate-800">
                    <h3 class="text-[10px] font-bold text-slate-300 mb-3 flex items-center justify-center">
                        <span class="w-5 h-5 bg-sky-500 text-slate-900 rounded-full flex items-center justify-center mr-2 text-[10px] font-black">1</span>
                        1ST INVERSION
                    </h3>
                    <div class="flex gap-3 justify-center">
                        <div id="first-inv-1" class="w-14 h-14 border-2 border-dashed border-slate-600 rounded-xl flex items-center justify-center text-xl font-bold text-slate-600">?</div>
                        <div id="first-inv-2" class="w-14 h-14 border-2 border-dashed border-slate-600 rounded-xl flex items-center justify-center text-xl font-bold text-slate-600">?</div>
                        <div id="first-inv-3" class="w-14 h-14 border-2 border-dashed border-slate-600 rounded-xl flex items-center justify-center text-xl font-bold text-slate-600">?</div>
                    </div>
                </section>

                <!-- 2nd Inversion Section -->
                <section class="bg-slate-900/40 p-4 rounded-xl border border-slate-800">
                    <h3 class="text-[10px] font-bold text-slate-300 mb-3 flex items-center justify-center">
                        <span class="w-5 h-5 bg-sky-500 text-slate-900 rounded-full flex items-center justify-center mr-2 text-[10px] font-black">2</span>
                        2ND INVERSION
                    </h3>
                    <div class="flex gap-3 justify-center">
                        <div id="second-inv-1" class="w-14 h-14 border-2 border-dashed border-slate-600 rounded-xl flex items-center justify-center text-xl font-bold text-slate-600">?</div>
                        <div id="second-inv-2" class="w-14 h-14 border-2 border-dashed border-slate-600 rounded-xl flex items-center justify-center text-xl font-bold text-slate-600">?</div>
                        <div id="second-inv-3" class="w-14 h-14 border-2 border-dashed border-slate-600 rounded-xl flex items-center justify-center text-xl font-bold text-slate-600">?</div>
                    </div>
                </section>
            </div>

            <!-- Options Section -->
            <section class="pt-4 border-t border-slate-800">
                <div id="note-options" class="flex justify-center gap-4">
                    <!-- Dynamic buttons will go here -->
                </div>
            </section>

            <!-- Message Area -->
            <div id="status-message" class="h-5 text-center text-xs font-bold transition-opacity duration-300 opacity-0 tracking-wide uppercase">
                Correct!
            </div>

            <!-- Footer Controls -->
            <div class="flex gap-4 max-w-sm mx-auto">
                <button onclick="resetExercise()" class="flex-1 py-2 bg-slate-800 text-slate-400 rounded-xl text-[10px] font-bold hover:bg-slate-700 transition-colors border border-slate-700">
                    CLEAR
                </button>
                <button id="next-btn" onclick="nextQuestion()" disabled class="flex-[2] py-2 bg-slate-800 text-slate-600 cursor-not-allowed rounded-xl text-[10px] font-black transition-all border border-slate-700 uppercase tracking-widest">
                    Next Chord
                </button>
            </div>
        </div>
    </div>

    <script>
        // Updated to Minor Chord configurations
        const allChords = [
            { name: "C", notes: ["C", "Eb", "G"] },
            { name: "C#", notes: ["C#", "E", "G#"] },
            { name: "D", notes: ["D", "F", "A"] },
            { name: "Eb", notes: ["Eb", "Gb", "Bb"] },
            { name: "E", notes: ["E", "G", "B"] },
            { name: "F", notes: ["F", "Ab", "C"] },
            { name: "F#", notes: ["F#", "A", "C#"] },
            { name: "G", notes: ["G", "Bb", "D"] },
            { name: "Ab", notes: ["Ab", "Cb", "Eb"] },
            { name: "A", notes: ["A", "C", "E"] },
            { name: "Bb", notes: ["Bb", "Db", "F"] },
            { name: "B", notes: ["B", "D", "F#"] }
        ];

        let quizChords = [];
        let currentQuizIndex = 0;
        let currentFirstIndex = 0;
        let currentSecondIndex = 0;
        let score = 0;

        function initQuiz() {
            quizChords = [...allChords].sort(() => Math.random() - 0.5);
            currentQuizIndex = 0;
            score = 0;
            
            const dotsContainer = document.getElementById('progress-dots');
            dotsContainer.innerHTML = '';
            for(let i=0; i<12; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                dot.id = `dot-${i}`;
                dotsContainer.appendChild(dot);
            }
            
            updateUI();
        }

        function updateUI() {
            const chord = quizChords[currentQuizIndex];
            document.getElementById('display-chord-name').innerText = chord.name + " Minor";
            document.getElementById('display-root-notes').innerText = `(Root: ${chord.notes.join('  ')})`;
            document.getElementById('quiz-progress').innerText = `Question ${currentQuizIndex + 1} / 12`;
            document.getElementById('score-display').innerText = `Score: ${score}`;
            
            document.querySelectorAll('.progress-dot').forEach((dot, idx) => {
                dot.classList.remove('completed');
                if (idx < currentQuizIndex) dot.classList.add('completed');
            });

            renderOptions();

            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = true;
            nextBtn.className = "flex-[2] py-2 bg-slate-800 text-slate-600 cursor-not-allowed rounded-xl text-[10px] font-black transition-all border border-slate-700 uppercase tracking-widest";
            nextBtn.innerText = "Next Chord";
        }

        function renderOptions() {
            const optionsContainer = document.getElementById('note-options');
            optionsContainer.innerHTML = '';
            const chord = quizChords[currentQuizIndex];
            const shuffledNotes = [...chord.notes].sort(() => Math.random() - 0.5);
            
            shuffledNotes.forEach(note => {
                const btn = document.createElement('button');
                btn.className = "note-box w-16 h-16 bg-slate-800 border-2 border-slate-700 rounded-2xl flex items-center justify-center font-black text-xl text-sky-400 hover:text-white shadow-lg";
                btn.innerText = note;
                btn.onclick = () => handleNoteClick(note);
                optionsContainer.appendChild(btn);
            });
        }

        function handleNoteClick(note) {
            const chord = quizChords[currentQuizIndex];
            const firstCorrect = [chord.notes[1], chord.notes[2], chord.notes[0]];
            const secondCorrect = [chord.notes[2], chord.notes[0], chord.notes[1]];

            if (currentFirstIndex < 3) {
                const box = document.getElementById(`first-inv-${currentFirstIndex + 1}`);
                processSelection(box, note, firstCorrect[currentFirstIndex], () => {
                    currentFirstIndex++;
                    if (currentFirstIndex === 3) {
                        showMessage("1st Inv Complete! Shuffling...", "text-sky-400");
                        renderOptions();
                    } else {
                        showMessage("Keep going!", "text-emerald-400");
                    }
                });
            } else if (currentSecondIndex < 3) {
                const box = document.getElementById(`second-inv-${currentSecondIndex + 1}`);
                processSelection(box, note, secondCorrect[currentSecondIndex], () => {
                    currentSecondIndex++;
                    if (currentSecondIndex === 3) {
                        score++;
                        document.getElementById('score-display').innerText = `Score: ${score}`;
                        showMessage("Perfect Inversions!", "text-sky-400");
                        enableNext();
                    } else {
                        showMessage("Great!", "text-emerald-400");
                    }
                });
            }
        }

        function processSelection(box, selected, target, onSuccess) {
            box.innerText = selected;
            box.classList.remove('border-dashed', 'text-slate-600');
            box.classList.add('text-white', 'border-solid');

            if (selected === target) {
                box.classList.add('correct');
                onSuccess();
            } else {
                box.classList.add('incorrect');
                showMessage("Mismatch! Section Reset", "text-red-400");
                setTimeout(() => {
                    resetCurrentInversion();
                    renderOptions();
                }, 600);
            }
        }

        function resetCurrentInversion() {
            const isFirst = currentFirstIndex < 3;
            if (isFirst) {
                currentFirstIndex = 0;
                for(let i=1; i<=3; i++) {
                    const b = document.getElementById(`first-inv-${i}`);
                    b.innerText = '?';
                    b.className = "w-14 h-14 border-2 border-dashed border-slate-600 rounded-xl flex items-center justify-center text-xl font-bold text-slate-600";
                }
            } else {
                currentSecondIndex = 0;
                for(let i=1; i<=3; i++) {
                    const b = document.getElementById(`second-inv-${i}`);
                    b.innerText = '?';
                    b.className = "w-14 h-14 border-2 border-dashed border-slate-600 rounded-xl flex items-center justify-center text-xl font-bold text-slate-600";
                }
            }
        }

        function enableNext() {
            const btn = document.getElementById('next-btn');
            btn.disabled = false;
            btn.className = "flex-[2] py-2 bg-sky-500 text-slate-900 rounded-xl text-[10px] font-black hover:bg-sky-400 shadow-[0_0_20px_rgba(56,189,248,0.3)] transition-all transform scale-105 uppercase tracking-widest";
            btn.innerText = currentQuizIndex === 11 ? "Finish Quiz" : "Next Chord →";
        }

        function nextQuestion() {
            if (currentQuizIndex < 11) {
                currentQuizIndex++;
                resetExercise();
                updateUI();
            } else {
                alert(`Minor Quiz Complete! Score: ${score}/12`);
                initQuiz();
            }
        }

        function showMessage(text, colorClass) {
            const el = document.getElementById('status-message');
            el.innerText = text;
            el.className = `h-5 text-center text-xs font-bold transition-opacity duration-300 opacity-100 tracking-wide uppercase ${colorClass}`;
        }

        function resetExercise() {
            currentFirstIndex = 0;
            currentSecondIndex = 0;
            const boxes = document.querySelectorAll('[id^="first-inv-"], [id^="second-inv-"]');
            boxes.forEach(box => {
                box.innerText = '?';
                box.className = "w-14 h-14 border-2 border-dashed border-slate-600 rounded-xl flex items-center justify-center text-xl font-bold text-slate-600";
            });
            document.getElementById('status-message').classList.add('opacity-0');
        }

        initQuiz();
    </script>
</body>
</html>
