<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Notation Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Sans+Tamil:wght@400;700&family=Noto+Sans+Devanagari:wght@400;700&family=Roboto+Mono:wght@700&display=swap');

        body {
            background-color: #f1f5f9;
            color: #000;
            font-family: 'Inter', sans-serif;
        }
        
        .paper {
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            width: 210mm;
            min-height: 297mm;
            margin: 20px auto;
            padding: 15mm 15mm; 
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        .notation-container {
            width: 100%;
            margin-top: 20px;
        }

        .measure-row {
            display: flex;
            width: 100%;
            margin-bottom: 3.5rem;
            page-break-inside: avoid;
            align-items: flex-end;
            flex-wrap: nowrap;
        }

        .measure {
            display: flex;
            flex-direction: row;
            flex: 0 0 auto; 
            gap: 12px; 
            padding-bottom: 4px;
            align-items: flex-end;
            min-height: 110px;
            position: relative;
            border-right: 1.5px solid #cbd5e1;
            padding-right: 14px;
            margin-right: 10px;
        }

        .measure:last-child {
            border-right: none;
        }

        .syllable-block {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            width: auto; 
            min-width: 32px;
        }

        input[type="text"] {
            -webkit-appearance: none;
            appearance: none;
            border-radius: 0;
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            text-align: center;
        }

        .chord-input, .chord-static {
            font-family: 'Inter', sans-serif;
            color: #16a34a; 
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 2px;
            min-height: 1.2rem;
        }

        .note-input, .note-static {
            font-family: 'Roboto Mono', monospace;
            color: #2563eb; 
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 3px;
        }

        .lyric-input, .lyric-static {
            font-family: 'Libre Baskerville', serif;
            color: #000;
            font-size: 1.1rem;
            white-space: nowrap;
        }

        .native-input, .native-static {
            font-family: 'Noto Sans Tamil', 'Noto Sans Devanagari', sans-serif;
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 2px;
            white-space: nowrap;
            min-height: 1.1rem;
        }

        .title-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            text-align: center;
        }

        #songTitle {
            font-family: 'Inter', sans-serif;
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 15px;
            outline: none;
            width: 100%;
            text-align: center;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .song-info-box {
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: #1e293b;
            border-bottom: 1.5px solid #e2e8f0;
            padding-bottom: 4px;
            width: 100%;
        }

        .info-label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 800;
            margin-bottom: 4px;
            letter-spacing: 0.15em;
        }

        .transpose-controls {
            display: flex; 
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 4px;
        }

        .btn-transpose {
            background: #e2e8f0;
            border-radius: 4px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            color: #475569;
        }

        @media print {
            .no-print { display: none !important; }
            .paper { box-shadow: none; margin: 0; width: 100%; padding: 0; }
            .measure { border-right-color: #000; }
        }
    </style>
</head>
<body class="p-4">

    <div class="no-print max-w-4xl mx-auto bg-slate-800 text-white p-6 rounded-2xl mb-8 shadow-2xl">
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
            <span class="bg-indigo-500 p-1 rounded">🎹</span> Sheet Music Generator
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 bg-slate-700 p-4 rounded-xl">
            <div class="col-span-1 md:col-span-2">
                <label class="block text-[10px] text-slate-400 uppercase font-bold mb-1">Lyrics (use ~ for syllables)</label>
                <textarea id="lyricInput" class="w-full bg-slate-600 p-2 rounded-lg border border-slate-500 h-10 transition-all focus:h-24 text-sm" placeholder="En~gal Vazh~naa~lel~laam..."></textarea>
            </div>
            <div>
                <label class="block text-[10px] text-slate-400 uppercase font-bold mb-1">Base Scale</label>
                <input type="text" id="manualScale" class="w-full bg-slate-600 p-2 rounded-lg border border-slate-500 text-sm" value="C Major">
            </div>
            <div>
                <label class="block text-[10px] text-slate-400 uppercase font-bold mb-1">Time Sig</label>
                <select id="manualTimeSig" class="w-full bg-slate-600 p-2 rounded-lg border border-slate-500 text-sm">
                    <option value="4/4">4/4</option>
                    <option value="3/4">3/4</option>
                    <option value="2/4">2/4</option>
                    <option value="6/8">6/8</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="file" id="midiInput" accept=".mid,.midi" class="w-full bg-slate-700 p-2 rounded-lg border border-slate-600 text-sm">
            <div class="flex gap-2">
                <button id="processBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-2 rounded-lg font-bold flex items-center justify-center gap-2">
                    <span id="btnText">Generate Sheet</span>
                    <div id="loader" class="hidden animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div>
                </button>
                <div class="flex flex-col gap-1 flex-1 hidden" id="exportActions">
                    <button id="downloadPdfBtn" class="bg-emerald-600 hover:bg-emerald-500 py-2 rounded-lg font-bold text-sm">Download PDF</button>
                    <button id="downloadHtmlBtn" class="bg-blue-600 hover:bg-blue-500 py-2 rounded-lg font-bold text-sm">Download HTML</button>
                </div>
            </div>
        </div>
    </div>

    <div class="paper" id="printableArea">
        <div class="title-container">
            <div id="songTitle" contenteditable="true" spellcheck="false">SONG TITLE</div>
            
            <div class="info-grid">
                <div>
                    <span class="info-label">Scale</span>
                    <input type="text" id="scaleDisplay" class="song-info-box" value="C Major">
                    <div class="transpose-controls no-print" id="transposer">
                        <div class="btn-transpose" onclick="transposeSheet(-1)">-</div>
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Transpose</span>
                        <div class="btn-transpose" onclick="transposeSheet(1)">+</div>
                    </div>
                </div>
                <div>
                    <span class="info-label">Rhythm</span>
                    <input type="text" id="rhythmDisplay" class="song-info-box" value="4/4">
                </div>
                <div>
                    <span class="info-label">BPM</span>
                    <input type="text" id="bpmDisplay" class="song-info-box" value="108">
                </div>
            </div>
        </div>

        <div id="outputArea" class="notation-container">
            <div class="text-slate-300 text-center py-32 italic">Upload MIDI and lyrics to generate...</div>
        </div>
    </div>

    <script id="mainScript">
        const apiKey = "";
        const CHROMATIC = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

        async function transliterateLyrics(text) {
            const prompt = `Transliterate the following lyrics to native script (Tamil/Hindi). Preserve syllable boundaries using ~. Output JSON: {"transliteration": "${text}", "native": "native script with ~ syllables"}. 
            Input: ${text}`;

            try {
                let retries = 0;
                while (retries < 3) { 
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        const data = await response.json();
                        return JSON.parse(data.candidates[0].content.parts[0].text);
                    } catch (e) {
                        retries++;
                        await new Promise(r => setTimeout(r, 500));
                    }
                }
            } catch (err) {
                return null;
            }
        }

        function transposeNote(noteName, semitones) {
            if (!noteName) return "";
            let rootMatch = noteName.match(/^[A-G][#b]?/);
            if (!rootMatch) return noteName;
            let root = rootMatch[0];
            let suffix = noteName.slice(root.length);
            const mapping = { 'Db':'C#', 'D#':'Eb', 'Gb':'F#', 'G#':'Ab', 'A#':'Bb' };
            let normalized = mapping[root] || root;
            let idx = CHROMATIC.indexOf(normalized);
            if (idx === -1) return noteName;
            let newIdx = (idx + semitones) % 12;
            if (newIdx < 0) newIdx += 12;
            return CHROMATIC[newIdx] + suffix;
        }

        window.transposeSheet = function(semitones) {
            const scaleDisplay = document.getElementById('scaleDisplay');
            if (scaleDisplay) {
                let scaleVal = scaleDisplay.value || scaleDisplay.innerText;
                let scaleRoot = scaleVal.match(/^[A-G][#b]?/);
                if (scaleRoot) {
                    let suffix = scaleVal.slice(scaleRoot[0].length);
                    let newVal = transposeNote(scaleRoot[0], semitones) + suffix;
                    if (scaleDisplay.tagName === 'INPUT') scaleDisplay.value = newVal;
                    else scaleDisplay.innerText = newVal;
                }
            }
            document.querySelectorAll('.chord-input, .chord-static, .note-input, .note-static').forEach(el => {
                let val = el.value !== undefined ? el.value : el.innerText;
                if (val) {
                    let newVal = transposeNote(val, semitones);
                    if (el.tagName === 'INPUT') el.value = newVal;
                    else el.innerText = newVal;
                }
            });
        };

        const midiInput = document.getElementById('midiInput');
        const lyricInput = document.getElementById('lyricInput');
        const processBtn = document.getElementById('processBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const outputArea = document.getElementById('outputArea');

        function cleanName(n) { return n.replace(/\d+$/, ''); }

        function identifyChord(notes, melNote, melTrackId) {
            if (!notes || notes.length === 0) return "";
            const n2v = { 'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11 };
            const harm = notes.filter(n => n.tId !== melTrackId);
            if (harm.length < 1) return ""; 
            let semi = [...new Set(harm.map(n => n2v[cleanName(n.name)]))].sort((a,b)=>a-b);
            if (semi.length === 0) return "";
            const root = semi[0];
            const set = new Set(semi.map(s => (s-root+12)%12));
            if (set.has(4)&&set.has(7)) return CHROMATIC[root];
            if (set.has(3)&&set.has(7)) return CHROMATIC[root]+"m";
            return CHROMATIC[root];
        }

        function adjustWidth(input) {
            const temp = document.createElement('span');
            temp.style.font = window.getComputedStyle(input).font;
            temp.style.visibility = 'hidden';
            temp.style.position = 'absolute';
            temp.innerText = input.value || " ";
            document.body.appendChild(temp);
            const width = temp.getBoundingClientRect().width;
            document.body.removeChild(temp);
            input.parentElement.style.width = (Math.max(width, 32) + 16) + 'px';
        }

        processBtn.addEventListener('click', async () => {
            if (!midiInput.files[0] || !lyricInput.value) return;
            
            loader.classList.remove('hidden');
            btnText.innerText = "Processing...";
            
            const translitPromise = transliterateLyrics(lyricInput.value);
            
            const buf = await midiInput.files[0].arrayBuffer();
            const midi = new Midi(buf);
            const tracks = midi.tracks.filter(t => t.notes.length > 0).map((t,i)=>{
                t.tId = `t${i}`;
                t.notes.forEach(n => n.tId = t.tId);
                return t;
            });
            const melody = tracks.reduce((a,b)=>a.notes.length > b.notes.length ? a : b);
            
            const bpm = Math.round(midi.header.tempos[0]?.bpm || 120);
            document.getElementById('bpmDisplay').value = bpm;
            document.getElementById('rhythmDisplay').value = document.getElementById('manualTimeSig').value;
            document.getElementById('scaleDisplay').value = document.getElementById('manualScale').value;

            const translitData = await translitPromise;

            const prepareLineQueues = (text) => {
                if (!text) return [];
                return text.split('\n').map(line => {
                    return line.trim().split(/\s+/).flatMap(word => word.split('~'));
                });
            };

            const translitLines = prepareLineQueues(translitData?.transliteration || lyricInput.value);
            const nativeLines = prepareLineQueues(translitData?.native || "");

            outputArea.innerHTML = "";
            let time = 0;
            const timeSigNum = parseInt(document.getElementById('manualTimeSig').value.split('/')[0]) || 4;
            const mDur = (60/bpm) * timeSigNum;
            
            let maxT = 0;
            tracks.forEach(t => t.notes.forEach(n => { if(n.time > maxT) maxT = n.time; }));

            let currentLineIdx = 0;

            while (time < (maxT + 0.1)) {
                const row = document.createElement('div');
                row.className = "measure-row";
                outputArea.appendChild(row);

                const currentTranslitQueue = translitLines[currentLineIdx] || [];
                const currentNativeQueue = nativeLines[currentLineIdx] || [];

                for (let m=0; m<2; m++) {
                    const mDiv = document.createElement('div');
                    mDiv.className = "measure";
                    row.appendChild(mDiv);

                    const mNotes = melody.notes.filter(n => n.time >= (time-0.02) && n.time < (time+mDur-0.02));
                    
                    mNotes.forEach(n => {
                        const sim = [];
                        tracks.forEach(t => t.notes.forEach(cn => { 
                            if(Math.abs(cn.time-n.time) < 0.1) sim.push(cn); 
                        }));
                        
                        const b = document.createElement('div');
                        b.className = "syllable-block";
                        
                        const cIn = document.createElement('input');
                        cIn.type = 'text'; cIn.className = 'chord-input'; 
                        cIn.value = identifyChord(sim, n, melody.tId);
                        
                        const nIn = document.createElement('input');
                        nIn.type = 'text'; nIn.className = 'note-input'; 
                        nIn.value = cleanName(n.name);
                        
                        const lIn = document.createElement('input');
                        lIn.type = 'text'; lIn.className = 'lyric-input'; 
                        lIn.value = currentTranslitQueue.shift() || "";
                        
                        const natIn = document.createElement('input');
                        natIn.type = 'text'; natIn.className = 'native-input'; 
                        natIn.value = lIn.value ? (currentNativeQueue.shift() || "") : "";

                        b.appendChild(cIn); b.appendChild(nIn); b.appendChild(lIn); b.appendChild(natIn);
                        mDiv.appendChild(b);
                        adjustWidth(lIn);
                    });
                    
                    if (mNotes.length === 0) mDiv.style.minWidth = "150px";
                    time += mDur;
                }
                currentLineIdx++;
            }
            
            loader.classList.add('hidden');
            btnText.innerText = "Generate Sheet";
            document.getElementById('exportActions').classList.remove('hidden');
        });

        document.getElementById('downloadPdfBtn').addEventListener('click', () => {
            const element = document.getElementById('printableArea');
            html2pdf().set({
                margin: [10, 5, 10, 5],
                filename: `${document.getElementById('songTitle').innerText}.pdf`,
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(element).save();
        });

        document.getElementById('downloadHtmlBtn').addEventListener('click', () => {
            const printableArea = document.getElementById('printableArea');
            const clonedSheet = printableArea.cloneNode(true);
            
            const exportedTitle = clonedSheet.querySelector('#songTitle');
            if(exportedTitle) {
                exportedTitle.removeAttribute('contenteditable');
                exportedTitle.removeAttribute('spellcheck');
            }

            clonedSheet.querySelectorAll('input').forEach(input => {
                const span = document.createElement('span');
                span.className = input.className.replace('-input', '-static');
                span.innerText = input.value;
                input.parentNode.replaceChild(span, input);
            });

            const styles = document.querySelector('style').innerHTML;
            
            const exportScript = `
                const CHROMATIC = ${JSON.stringify(CHROMATIC)};
                function transposeNote(noteName, semitones) {
                    if (!noteName) return "";
                    let rootMatch = noteName.match(/^[A-G][#b]?/);
                    if (!rootMatch) return noteName;
                    let root = rootMatch[0];
                    let suffix = noteName.slice(root.length);
                    const mapping = { 'Db':'C#', 'D#':'Eb', 'Gb':'F#', 'G#':'Ab', 'A#':'Bb' };
                    let normalized = mapping[root] || root;
                    let idx = CHROMATIC.indexOf(normalized);
                    if (idx === -1) return noteName;
                    let newIdx = (idx + semitones) % 12;
                    if (newIdx < 0) newIdx += 12;
                    return CHROMATIC[newIdx] + suffix;
                }
                window.transposeSheet = function(semitones) {
                    const scaleDisplay = document.getElementById('scaleDisplay');
                    if (scaleDisplay) {
                        let scaleVal = scaleDisplay.innerText;
                        let scaleRoot = scaleVal.match(/^[A-G][#b]?/);
                        if (scaleRoot) {
                            let suffix = scaleVal.slice(scaleRoot[0].length);
                            scaleDisplay.innerText = transposeNote(scaleRoot[0], semitones) + suffix;
                        }
                    }
                    document.querySelectorAll('.chord-static, .note-static').forEach(el => {
                        let val = el.innerText;
                        if (val) el.innerText = transposeNote(val, semitones);
                    });
                };
            `;

            const htmlContent = `<html><head><style>${styles} body{background:white;padding:20px;}.paper{box-shadow:none;width:100%;}</style></head><body><div class="paper">${clonedSheet.innerHTML}</div><script>${exportScript}<\/script></body></html>`;
            
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${document.getElementById('songTitle').innerText || 'SongNotation'}.html`;
            link.click();
        });
    </script>
</body>
</html>
