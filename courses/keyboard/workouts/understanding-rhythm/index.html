<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm & Syllable Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 231, 235, 1);
        }
        .beat-number {
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #fee2e2; 
        }
        .beat-active {
            color: #ef4444; 
            transform: scale(1.6);
            font-weight: 900;
        }
        #bouncingBall {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .syllable-btn {
            transition: all 0.2s;
        }
        .syllable-btn.selected {
            background-color: #ef4444;
            color: white;
            border-color: #b91c1c;
        }
        /* Success Overlay */
        #successOverlay {
            display: none;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="glass-card max-w-2xl w-full rounded-3xl shadow-2xl p-8 space-y-6 relative overflow-hidden">
        
        <!-- Success Overlay -->
        <div id="successOverlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center p-8 text-center animate-in fade-in duration-300">
            <div class="bg-white p-8 rounded-3xl shadow-2xl border border-green-100 flex flex-col items-center">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl mb-4">✓</div>
                <h2 class="text-3xl font-black text-slate-800 mb-2">Excellent!</h2>
                <p class="text-slate-500 mb-6" id="successMessage">You found all syllables for this section.</p>
                <button onclick="nextLevel()" id="nextBtn" class="px-8 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 transition-all">Next Section →</button>
            </div>
        </div>

        <div class="text-center">
            <div class="inline-block px-3 py-1 bg-red-50 text-red-600 text-[10px] font-bold rounded-full mb-2 uppercase tracking-widest" id="levelIndicator">Section 1 of 1</div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">Syllable Trainer</h1>
            <p class="text-slate-500 text-sm">Select the 4 syllables that fall on <span class="text-red-600 font-bold underline">Beat 1</span></p>
        </div>

        <!-- Visual Metronome -->
        <div class="bg-white rounded-2xl p-10 border-2 border-slate-200 relative overflow-hidden shadow-inner">
            <div class="flex justify-between items-center relative z-10 px-4">
                <div id="beat1" class="beat-number text-5xl">1</div>
                <div id="beat2" class="beat-number text-5xl">2</div>
                <div id="beat3" class="beat-number text-5xl">3</div>
                <div id="beat4" class="beat-number text-5xl">4</div>
            </div>
            
            <div class="mt-14 h-2 bg-red-50 w-full rounded-full relative">
                <div id="bouncingBall" class="absolute -top-4 left-0 w-10 h-10 bg-red-600 rounded-full shadow-lg border-4 border-white z-20"></div>
            </div>
        </div>

        <!-- Game Area: Lyrics -->
        <div class="space-y-4">
            <div class="flex justify-between items-end">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Syllables (Click to choose)</label>
                <div id="scoreDisplay" class="text-sm font-bold text-red-600">Selected: 0/4</div>
            </div>
            <div id="syllableContainer" class="flex flex-wrap gap-2 p-5 bg-white rounded-xl border-2 border-slate-100 min-h-[120px] shadow-sm">
                <!-- Populated by JS -->
            </div>
            <button onclick="checkAnswers()" class="w-full py-4 bg-red-600 text-white rounded-2xl font-black text-lg hover:bg-red-700 shadow-lg shadow-red-200 transition-all active:scale-95">CHECK MY ANSWERS</button>
        </div>

        <!-- Audio Controls -->
        <div class="space-y-6 pt-4 border-t border-slate-100">
            <div class="space-y-4">
                <div class="flex justify-between items-end">
                    <div class="space-y-1">
                        <span class="block text-[10px] font-bold text-slate-400 uppercase">Lesson Tempo</span>
                        <div class="flex items-baseline gap-1">
                            <span id="currentBPM" class="text-4xl font-black text-red-600 font-mono">96</span>
                            <span class="text-sm font-bold text-slate-400">BPM</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="block text-[10px] font-bold text-slate-400 uppercase">Original Song</span>
                        <span id="originalBPMDisplay" class="text-sm font-bold text-slate-600">96 BPM</span>
                    </div>
                </div>
                
                <input type="range" id="tempoSlider" min="48" max="144" step="1" value="96" class="w-full h-3 bg-slate-200 rounded-lg appearance-none accent-red-600 cursor-pointer">
            </div>
            
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <!-- Status indicator for debugging -->
                <div id="audioStatus" class="text-[9px] font-bold text-slate-400 uppercase mb-2">Audio: Loading...</div>
                
                <audio id="mainAudio" class="hidden" preload="auto">
                    <source src="song/song.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>

                <div class="flex gap-2">
                    <button id="playBtn" class="flex-1 bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-black transition-colors">Play Loop</button>
                    <button id="pauseBtn" class="flex-1 bg-slate-200 text-slate-800 py-4 rounded-xl font-bold hover:bg-slate-300 transition-colors">Pause</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- TEACHER: CONFIGURE YOUR SONG HERE ---
        // Match your VS Code sidebar: Folder "song" / File "song.mp3"
        const AUDIO_PATH = "song/song.mp3"; 
        const BASE_BPM = 96;

        const SONG_LEVELS = [
            {
                name: "Section 1",
                loopStart: 0.0,       
                loopEnd: 10.0,        
                lyrics: ["Nan", "dri", "yaal", "Thu", "thi", "Paa", "du", "Nam", "Yae", "su", "vai", "Na", "va", "lae", "En", "drum", "Pa", "du"],
                correctIndices: [0, 6, 11, 17] 
            }
        ];

        let currentLevelIdx = 0;
        const audio = document.getElementById('mainAudio');
        const audioStatus = document.getElementById('audioStatus');
        const tempoSlider = document.getElementById('tempoSlider');
        const currentBPMDisplay = document.getElementById('currentBPM');
        const originalBPMDisplay = document.getElementById('originalBPMDisplay');
        const ball = document.getElementById('bouncingBall');
        const syllableContainer = document.getElementById('syllableContainer');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const successOverlay = document.getElementById('successOverlay');
        const levelIndicator = document.getElementById('levelIndicator');

        let selectedIndices = [];

        // Error handling for audio loading
        audio.onerror = () => {
            audioStatus.innerText = "Audio: Error Loading File! Check folder/filename.";
            audioStatus.classList.add('text-red-500');
        };

        audio.oncanplaythrough = () => {
            audioStatus.innerText = "Audio: Ready";
            audioStatus.classList.remove('text-red-500');
            audioStatus.classList.add('text-green-500');
        };

        function initApp() {
            const config = SONG_LEVELS[currentLevelIdx];
            levelIndicator.innerText = `Section ${currentLevelIdx + 1} of ${SONG_LEVELS.length}`;
            
            syllableContainer.innerHTML = '';
            selectedIndices = [];
            scoreDisplay.innerText = `Selected: 0/${config.correctIndices.length}`;
            
            config.lyrics.forEach((syl, index) => {
                const btn = document.createElement('button');
                btn.className = 'syllable-btn px-4 py-2 bg-white border-2 border-slate-100 rounded-xl text-base font-bold text-slate-700 hover:border-red-300';
                btn.innerText = syl;
                btn.onclick = () => toggleSyllable(btn, index);
                syllableContainer.appendChild(btn);
            });

            originalBPMDisplay.innerText = `${BASE_BPM} BPM`;
            updateTempoFromBPM();
        }

        function toggleSyllable(btn, index) {
            const config = SONG_LEVELS[currentLevelIdx];
            if (selectedIndices.includes(index)) {
                selectedIndices = selectedIndices.filter(i => i !== index);
                btn.classList.remove('selected');
            } else if (selectedIndices.length < config.correctIndices.length) {
                selectedIndices.push(index);
                btn.classList.add('selected');
            }
            scoreDisplay.innerText = `Selected: ${selectedIndices.length}/${config.correctIndices.length}`;
        }

        function checkAnswers() {
            const config = SONG_LEVELS[currentLevelIdx];
            if (selectedIndices.length < config.correctIndices.length) {
                alert(`Please select ${config.correctIndices.length} syllables first!`);
                return;
            }
            const correctCount = selectedIndices.filter(i => config.correctIndices.includes(i)).length;
            if (correctCount === config.correctIndices.length) showSuccess();
            else alert(`You found ${correctCount} out of ${config.correctIndices.length} correct.`);
        }

        function showSuccess() {
            audio.pause();
            successOverlay.style.display = 'flex';
            const nextBtn = document.getElementById('nextBtn');
            if (currentLevelIdx === SONG_LEVELS.length - 1) {
                document.getElementById('successMessage').innerText = "Song Completed!";
                nextBtn.innerText = "Restart Section";
                nextBtn.onclick = () => { successOverlay.style.display = 'none'; initApp(); };
            } else {
                nextBtn.onclick = nextLevel;
            }
        }

        function nextLevel() {
            currentLevelIdx++;
            successOverlay.style.display = 'none';
            initApp();
            audio.currentTime = SONG_LEVELS[currentLevelIdx].loopStart;
            audio.play();
        }

        function updateTempoFromBPM() {
            const targetBPM = parseFloat(tempoSlider.value);
            const rate = targetBPM / BASE_BPM;
            audio.playbackRate = rate;
            currentBPMDisplay.innerText = targetBPM;
        }

        function animate() {
            if (!audio.paused) {
                const config = SONG_LEVELS[currentLevelIdx];
                if (audio.currentTime >= config.loopEnd || audio.currentTime < config.loopStart) {
                    audio.currentTime = config.loopStart;
                }

                const currentBPM = parseFloat(tempoSlider.value);
                const secondsPerBeat = 60 / currentBPM;
                const secondsPerMeasure = secondsPerBeat * 4;
                const timeInLoop = audio.currentTime - config.loopStart;
                const measureProgress = (timeInLoop % secondsPerMeasure) / secondsPerMeasure;
                const beatProgress = (measureProgress * 4) % 1;
                const currentBeatIdx = Math.floor(measureProgress * 4);

                let visualPosition;
                if (beatProgress < 0.75) {
                    visualPosition = currentBeatIdx / 4;
                    ball.style.transform = 'scale(1)'; 
                } else {
                    const localProgress = (beatProgress - 0.75) / 0.25;
                    visualPosition = (currentBeatIdx + localProgress) / 4;
                    ball.style.transform = 'scale(0.8, 1.2)'; 
                }
                ball.style.left = (visualPosition * 92) + '%';
                document.querySelectorAll('.beat-number').forEach((el, idx) => {
                    if (idx === currentBeatIdx) el.classList.add('beat-active');
                    else el.classList.remove('beat-active');
                });
            }
            requestAnimationFrame(animate);
        }

        playBtn.onclick = () => {
            // Force the source again if it didn't load initially
            if (!audio.src || audio.src === "") audio.src = AUDIO_PATH;
            audio.play().catch(e => {
                console.error("Playback failed:", e);
                audioStatus.innerText = "Audio: Interaction required to play.";
            });
        };
        pauseBtn.onclick = () => audio.pause();
        tempoSlider.addEventListener('input', updateTempoFromBPM);

        window.onload = () => {
            initApp();
            animate();
        };
    </script>
</body>
</html>
