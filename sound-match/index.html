<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamHub — Music Academy</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

  <!-- ───── LOADING SPLASH ───── -->
  <div id="screen-loading" class="screen active" style="align-items:center;justify-content:center;flex-direction:column;gap:16px;">
    <div style="font-size:3rem;">🎹</div>
    <div style="font-size:1.2rem;font-weight:800;color:var(--gold);">ExamHub</div>
    <div class="spinner"></div>
    <div id="loading-msg" style="color:var(--text2);font-size:0.85rem;">Connecting…</div>
  </div>

  <!-- ───── LOGIN SCREEN ───── -->
  <div id="screen-login" class="screen">
    <div class="login-wrap">
      <div class="login-logo">
        <div class="logo-icon">🎹</div>
        <h1>ExamHub</h1>
        <p class="tagline">Music Academy · Examination Portal</p>
      </div>
      <div class="login-card">
        <div class="tab-row">
          <button class="tab-btn active" data-role="student">Student</button>
          <button class="tab-btn" data-role="teacher">Teacher</button>
        </div>
        <div class="field-group">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username" />
        </div>
        <div class="field-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" />
        </div>
        <div id="login-error" class="error-msg hidden"></div>
        <button class="btn-primary full" id="login-btn">Sign In</button>
        <p class="login-hint" id="login-hint">Students: enter your username &amp; password</p>
      </div>
    </div>
  </div>

  <!-- ───── STUDENT DASHBOARD ───── -->
  <div id="screen-student" class="screen">
    <div class="app-shell">
      <aside class="sidebar" id="student-sidebar">
        <div class="sidebar-brand">🎹 ExamHub</div>
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active" data-view="s-dashboard">🏠 Dashboard</a>
          <a href="#" class="nav-item" data-view="s-exams">📝 My Exams</a>
          <a href="#" class="nav-item" data-view="s-results">📊 My Results</a>
          <a href="#" class="nav-item" data-view="s-leaderboard">🏆 Leaderboard</a>
        </nav>
        <div style="padding:10px 10px 0;font-size:0.75rem;color:var(--text3);" id="student-name-tag"></div>
        <button class="btn-logout" id="student-logout">Sign Out</button>
      </aside>
      <main class="main-content" id="student-main">
        <div class="flex-center" style="height:60vh;"><div class="spinner"></div></div>
      </main>
    </div>
  </div>

  <!-- ───── TEACHER DASHBOARD ───── -->
  <div id="screen-teacher" class="screen">
    <div class="app-shell">
      <aside class="sidebar" id="teacher-sidebar">
        <div class="sidebar-brand">🎹 ExamHub</div>
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active" data-view="t-dashboard">🏠 Dashboard</a>
          <a href="#" class="nav-item" data-view="t-batches">👥 Batches</a>
          <a href="#" class="nav-item" data-view="t-students">🎓 Students</a>
          <a href="#" class="nav-item" data-view="t-exams">📋 Exams</a>
          <a href="#" class="nav-item" data-view="t-questions">❓ Question Bank</a>
          <a href="#" class="nav-item" data-view="t-results">📊 Results</a>
          <a href="#" class="nav-item" data-view="t-leaderboard">🏆 Leaderboard</a>
        </nav>
        <div style="padding:10px 10px 0;font-size:0.75rem;color:var(--text3);">👨‍🏫 Andrew</div>
        <button class="btn-logout" id="teacher-logout">Sign Out</button>
      </aside>
      <main class="main-content" id="teacher-main">
        <div class="flex-center" style="height:60vh;"><div class="spinner"></div></div>
      </main>
    </div>
  </div>

  <!-- ───── EXAM TAKING SCREEN ───── -->
  <div id="screen-exam" class="screen">
    <div class="exam-shell">
      <header class="exam-header">
        <div class="exam-title-bar">
          <span id="exam-taking-title">Exam</span>
          <div class="exam-meta-bar">
            <span class="timer-badge" id="exam-timer">⏱ 00:00</span>
            <span class="progress-badge" id="exam-progress">Q 1 / 1</span>
          </div>
        </div>
        <div class="exam-prog-bar"><div id="exam-prog-fill"></div></div>
      </header>
      <div class="exam-body" id="exam-body"></div>
      <footer class="exam-footer">
        <button class="btn-secondary" id="exam-prev">← Prev</button>
        <div id="exam-q-dots" class="q-dots"></div>
        <button class="btn-primary" id="exam-next">Next →</button>
      </footer>
    </div>
  </div>

  <!-- ───── MODAL ───── -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box" id="modal-box">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ───── TOAST ───── -->
  <div id="toast" class="toast hidden"></div>

  <!-- Firebase SDK loaded dynamically with guaranteed ordering -->
  <script>
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error('Failed to load: ' + src));
        document.head.appendChild(s);
      });
    }

    async function loadEverything() {
      const msgEl = document.getElementById('loading-msg');
      try {
        msgEl.textContent = 'Loading Firebase SDK…';
        await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js');
        await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js');
        await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js');

        if (typeof firebase === 'undefined') {
          throw new Error('Firebase SDK did not load. Check your internet connection or ad-blocker.');
        }

        msgEl.textContent = 'Initializing app…';
        await loadScript('js/firebase-init.js');
        await loadScript('js/db.js');
        await loadScript('js/auth.js');
        await loadScript('js/utils.js');
        await loadScript('js/questions.js');
        await loadScript('js/exam-engine.js');
        await loadScript('js/views-teacher.js');
        await loadScript('js/views-student.js');
        await loadScript('js/app.js');

      } catch (err) {
        msgEl.textContent = '❌ ' + err.message;
        msgEl.style.color = '#E74C3C';
        console.error(err);
      }
    }

    loadEverything();
  </script>
</body>
</html>
